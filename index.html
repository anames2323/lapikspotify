<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Spoofy • Главная</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="main-screen" class="main-screen" style="display:none;">
        <div class="sidebar">
            <div class="logo-small">
                <i class="fab fa-spotify"></i> Spoofy
            </div>
            <nav>
                <a href="#" class="nav-item active" data-page="home"><i class="fas fa-home"></i> Главная</a>
                <a href="#" class="nav-item" data-page="upload"><i class="fas fa-upload"></i> Загрузить</a>
            </nav>
        </div>

        <div class="main-content">
            <header class="top-bar">
                <div></div>
                <div class="profile-dropdown">
                    <button id="profile-btn" class="profile-btn">
                        <img id="user-avatar" src="https://i.pravatar.cc/40?img=7" alt="avatar">
                        <span id="user-display-name">User</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div id="profile-menu" class="dropdown-menu hidden">
                        <a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Выйти</a>
                    </div>
                </div>
            </header>

            <div id="home-page" class="page active">
                <h1 style="margin:20px 0;">Популярные треки</h1>
                <div id="tracks-container" class="tracklist"></div>
            </div>

            <div id="upload-page" class="page">
                <h1 style="margin:20px 0;">Загрузить трек</h1>
                <form id="upload-form" class="upload-form">
                    <div class="form-group">
                        <label>Название</label>
                        <input type="text" id="track-title" required>
                    </div>
                    <div class="form-group">
                        <label>Исполнитель</label>
                        <input type="text" id="track-artist" required>
                    </div>
                    <div class="form-group">
                        <label>Аудио (MP3)</label>
                        <input type="file" id="track-file" accept="audio/*" required>
                    </div>
                    <div class="form-group">
                        <label>Обложка</label>
                        <input type="file" id="track-cover" accept="image/*">
                    </div>
                    <div id="upload-progress" style="display:none; margin:10px 0;">
                        <div style="background:#333; height:4px; border-radius:2px;">
                            <div id="progress-fill" style="width:0%; height:100%; background:#1db954; border-radius:2px;"></div>
                        </div>
                        <span id="progress-text" style="color:#1db954; font-size:12px;">0%</span>
                    </div>
                    <button type="submit" class="auth-btn" style="width:100%;">Загрузить</button>
                </form>
            </div>
        </div>

        <div class="player-bar">
            <div class="now-playing">
                <img id="player-cover" src="https://via.placeholder.com/40/1db954/ffffff?text=♪" alt="cover">
                <div>
                    <div id="player-title">Не выбрано</div>
                    <div id="player-artist" style="font-size:12px; color:#b3b3b3;">—</div>
                </div>
            </div>
            <div class="player-center">
                <button id="play-btn" class="play-btn"><i class="fas fa-play"></i></button>
            </div>
            <div class="player-right">
                <i class="fas fa-volume-up" style="color:#b3b3b3;"></i>
                <input type="range" id="volume-slider" min="0" max="100" value="70" style="width:80px;">
            </div>
        </div>
    </div>

    <script>
        // Конфигурация Supabase
        const SUPABASE_URL = 'https://axocscfyyrtcegxvwal.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4b2NzY2Z5eXJ0Y2VneHZ3YWwiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0NTQ0MjE2MSwiZXhwIjoyMDYxMDE4MTYxfQ.LhT5jBx2RjGpGZqP9ZBjY8Z3lBmWk1iA2zFkV8ZQf1s';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let audio = new Audio();
        let currentPlaylist = [];
        let isPlaying = false;

        // ПРОВЕРКА АВТОРИЗАЦИИ - САМОЕ ВАЖНОЕ
        async function checkAuth() {
            console.log('Проверка авторизации...');
            const { data: { session } } = await supabase.auth.getSession();
            
            if (!session) {
                console.log('Не авторизован, перенаправляю на login.html');
                window.location.href = 'login.html';
                return false;
            }
            
            console.log('Авторизован:', session.user);
            currentUser = session.user;
            document.getElementById('main-screen').style.display = 'grid';
            updateUserUI();
            loadTracks();
            return true;
        }

        function updateUserUI() {
            if (!currentUser) return;
            const name = currentUser.user_metadata?.name || currentUser.email?.split('@')[0] || 'User';
            const avatar = currentUser.user_metadata?.avatar_url || `https://i.pravatar.cc/150?u=${currentUser.email}`;
            document.getElementById('user-display-name').textContent = name;
            document.getElementById('user-avatar').src = avatar;
        }

        async function loadTracks() {
            const { data, error } = await supabase.from('tracks').select('*').order('created_at', { ascending: false });
            if (error) {
                console.error('Ошибка загрузки треков:', error);
                return;
            }
            
            currentPlaylist = data || [];
            const container = document.getElementById('tracks-container');
            container.innerHTML = '';
            
            if (currentPlaylist.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-music"></i><p>Нет треков</p></div>';
                return;
            }
            
            currentPlaylist.forEach((track, i) => {
                const div = document.createElement('div');
                div.className = 'track-item';
                div.innerHTML = `
                    <span class="play-icon"><i class="far fa-play-circle"></i></span>
                    <img src="${track.cover_url || 'https://via.placeholder.com/40/1db954/ffffff?text=♪'}">
                    <span class="track-name">${track.title}</span>
                    <span>${track.artist}</span>
                    <span><i class="fas fa-headphones"></i> ${track.plays || 0}</span>
                `;
                div.addEventListener('click', () => playTrack(i));
                container.appendChild(div);
            });
        }

        function playTrack(index) {
            const track = currentPlaylist[index];
            document.getElementById('player-title').textContent = track.title;
            document.getElementById('player-artist').textContent = track.artist;
            document.getElementById('player-cover').src = track.cover_url || 'https://via.placeholder.com/40/1db954/ffffff?text=♪';
            
            audio.src = track.audio_url;
            audio.play();
            isPlaying = true;
            document.getElementById('play-btn').innerHTML = '<i class="fas fa-pause"></i>';
            
            supabase.from('tracks').update({ plays: (track.plays || 0) + 1 }).eq('id', track.id).then(() => loadTracks());
        }

        // Запускаем проверку при загрузке
        checkAuth();

        // Остальные обработчики
        document.getElementById('play-btn').addEventListener('click', () => {
            if (!audio.src) return;
            if (isPlaying) {
                audio.pause();
                document.getElementById('play-btn').innerHTML = '<i class="fas fa-play"></i>';
            } else {
                audio.play();
                document.getElementById('play-btn').innerHTML = '<i class="fas fa-pause"></i>';
            }
            isPlaying = !isPlaying;
        });

        audio.addEventListener('ended', () => {
            document.getElementById('play-btn').innerHTML = '<i class="fas fa-play"></i>';
            isPlaying = false;
        });

        document.getElementById('volume-slider').addEventListener('input', (e) => {
            audio.volume = e.target.value / 100;
        });

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(item.dataset.page + '-page').classList.add('active');
            });
        });

        document.getElementById('profile-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('profile-menu').classList.toggle('hidden');
        });
        document.addEventListener('click', () => document.getElementById('profile-menu').classList.add('hidden'));

        document.getElementById('logout-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            await supabase.auth.signOut();
            window.location.href = 'login.html';
        });

        document.getElementById('upload-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('track-title').value;
            const artist = document.getElementById('track-artist').value;
            const audioFile = document.getElementById('track-file').files[0];
            const coverFile = document.getElementById('track-cover').files[0];
            
            if (!audioFile) return alert('Выберите файл');
            
            const progressDiv = document.getElementById('upload-progress');
            const progressFill = document.getElementById('progress-fill');
            const progressText = document.getElementById('progress-text');
            
            progressDiv.style.display = 'block';
            
            try {
                const fileName = `${currentUser.id}/${Date.now()}_${audioFile.name}`;
                await supabase.storage.from('music').upload(fileName, audioFile);
                const audioUrl = supabase.storage.from('music').getPublicUrl(fileName).data.publicUrl;
                
                progressFill.style.width = '50%';
                progressText.textContent = '50%';
                
                let coverUrl = null;
                if (coverFile) {
                    const coverName = `${currentUser.id}/covers/${Date.now()}_${coverFile.name}`;
                    await supabase.storage.from('music').upload(coverName, coverFile);
                    coverUrl = supabase.storage.from('music').getPublicUrl(coverName).data.publicUrl;
                }
                
                await supabase.from('tracks').insert({
                    title, artist, artist_id: currentUser.id,
                    audio_url: audioUrl, cover_url: coverUrl, plays: 0
                });
                
                progressFill.style.width = '100%';
                progressText.textContent = '100%';
                
                setTimeout(() => {
                    alert('Трек загружен!');
                    document.getElementById('upload-form').reset();
                    progressDiv.style.display = 'none';
                    progressFill.style.width = '0%';
                    document.querySelector('[data-page="home"]').click();
                    loadTracks();
                }, 500);
                
            } catch (error) {
                alert('Ошибка: ' + error.message);
                progressDiv.style.display = 'none';
            }
        });
    </script>
</body>
        </html>
