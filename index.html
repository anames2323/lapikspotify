<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spoofy • Главная</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background: #000; color: #fff; }
        #main-screen { display: none; grid-template-columns: 240px 1fr; grid-template-rows: 1fr 90px; height: 100vh; }
        .sidebar { background: #000; grid-row: 1/3; padding: 24px 12px; border-right: 1px solid #282828; }
        .logo-small { font-size: 22px; font-weight: 700; margin-bottom: 25px; padding-left: 12px; color: #1db954; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px 15px; color: #b3b3b3; text-decoration: none; border-radius: 6px; cursor: pointer; }
        .nav-item:hover, .nav-item.active { color: #fff; background: #282828; }
        .main-content { background: linear-gradient(180deg, #1f1f1f 0%, #121212 100%); overflow-y: auto; padding: 0 30px 20px; }
        .top-bar { display: flex; justify-content: flex-end; padding: 16px 0; position: sticky; top: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .profile-btn { background: rgba(0,0,0,0.7); border: none; color: #fff; display: flex; align-items: center; gap: 10px; padding: 4px 12px 4px 4px; border-radius: 30px; cursor: pointer; }
        .profile-btn img { width: 32px; height: 32px; border-radius: 50%; }
        .dropdown-menu { position: absolute; right: 30px; top: 65px; background: #282828; border-radius: 6px; padding: 4px; min-width: 160px; }
        .dropdown-menu.hidden { display: none; }
        .dropdown-menu a { display: flex; align-items: center; gap: 10px; padding: 12px; color: #fff; text-decoration: none; }
        .page { display: none; }
        .page.active { display: block; }
        .tracklist { margin-top: 20px; }
        .track-item { display: grid; grid-template-columns: 40px 50px 2fr 1fr 80px; align-items: center; padding: 10px; border-radius: 6px; cursor: pointer; color: #b3b3b3; border-bottom: 1px solid #282828; }
        .track-item:hover { background: #282828; color: #fff; }
        .track-item img { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; }
        .track-name { color: #fff; font-weight: 500; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #b3b3b3; }
        .form-group input { width: 100%; padding: 12px; background: #1e1e1e; border: 1px solid #333; border-radius: 6px; color: #fff; }
        .auth-btn { background: #1db954; color: #000; font-weight: 700; padding: 16px; border: none; border-radius: 30px; cursor: pointer; width: 100%; }
        .player-bar { grid-column: 1/3; background: #181818; border-top: 1px solid #282828; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .now-playing { display: flex; align-items: center; gap: 12px; width: 25%; }
        .now-playing img { width: 45px; height: 45px; border-radius: 4px; }
        .play-btn { background: #fff; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
        .player-right { display: flex; align-items: center; gap: 10px; }
        .empty-state { text-align: center; padding: 50px; color: #888; }
    </style>
</head>
<body>

<div id="main-screen">
    <div class="sidebar">
        <div class="logo-small"><i class="fab fa-spotify"></i> Spoofy</div>
        <nav>
            <a class="nav-item active" data-page="home"><i class="fas fa-home"></i> Главная</a>
            <a class="nav-item" data-page="upload"><i class="fas fa-upload"></i> Загрузить</a>
        </nav>
    </div>

    <div class="main-content">
        <header class="top-bar">
            <div>
                <button id="profile-btn" class="profile-btn">
                    <img id="user-avatar" src="https://i.pravatar.cc/40?img=7">
                    <span id="user-display-name">User</span>
                    <i class="fas fa-chevron-down"></i>
                </button>
                <div id="profile-menu" class="dropdown-menu hidden">
                    <a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Выйти</a>
                </div>
            </div>
        </header>

        <div id="home-page" class="page active">
            <h1 style="margin:20px 0;">Популярные треки</h1>
            <div id="tracks-container" class="tracklist"></div>
        </div>

        <div id="upload-page" class="page">
            <h1 style="margin:20px 0;">Загрузить трек</h1>
            <form id="upload-form">
                <div class="form-group"><label>Название</label><input type="text" id="track-title" required></div>
                <div class="form-group"><label>Исполнитель</label><input type="text" id="track-artist" required></div>
                <div class="form-group"><label>Аудио (MP3)</label><input type="file" id="track-file" accept="audio/*" required></div>
                <div class="form-group"><label>Обложка</label><input type="file" id="track-cover" accept="image/*"></div>
                <div id="upload-progress" style="display:none; margin:10px 0;">
                    <div style="background:#333; height:4px; border-radius:2px;"><div id="progress-fill" style="width:0%; height:100%; background:#1db954;"></div></div>
                </div>
                <button type="submit" class="auth-btn">Загрузить</button>
            </form>
        </div>
    </div>

    <div class="player-bar">
        <div class="now-playing">
            <img id="player-cover" src="https://via.placeholder.com/40/1db954/ffffff?text=♪">
            <div><div id="player-title">Не выбрано</div><div id="player-artist" style="font-size:12px; color:#b3b3b3;">—</div></div>
        </div>
        <div><button id="play-btn" class="play-btn"><i class="fas fa-play"></i></button></div>
        <div class="player-right"><i class="fas fa-volume-up"></i><input type="range" id="volume-slider" min="0" max="100" value="70" style="width:80px;"></div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://axocscfyyrtcegxvwal.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4b2NzY2Z5eXJ0Y2VneHZ3YWwiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0NTQ0MjE2MSwiZXhwIjoyMDYxMDE4MTYxfQ.LhT5jBx2RjGpGZqP9ZBjY8Z3lBmWk1iA2zFkV8ZQf1s';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser = null, audio = new Audio(), currentPlaylist = [], isPlaying = false;

async function checkAuth() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    currentUser = session.user;
    document.getElementById('main-screen').style.display = 'grid';
    document.getElementById('user-display-name').textContent = currentUser.user_metadata?.name || currentUser.email?.split('@')[0];
    document.getElementById('user-avatar').src = currentUser.user_metadata?.avatar_url || `https://i.pravatar.cc/150?u=${currentUser.email}`;
    loadTracks();
}
checkAuth();

async function loadTracks() {
    const { data } = await supabase.from('tracks').select('*').order('created_at', { ascending: false });
    currentPlaylist = data || [];
    const c = document.getElementById('tracks-container');
    c.innerHTML = currentPlaylist.length ? '' : '<div class="empty-state"><i class="fas fa-music"></i><p>Нет треков</p></div>';
    currentPlaylist.forEach((t, i) => {
        const d = document.createElement('div'); d.className = 'track-item';
        d.innerHTML = `<span><i class="far fa-play-circle"></i></span><img src="${t.cover_url || 'https://via.placeholder.com/40/1db954/ffffff?text=♪'}"><span class="track-name">${t.title}</span><span>${t.artist}</span><span><i class="fas fa-headphones"></i> ${t.plays||0}</span>`;
        d.addEventListener('click', () => playTrack(i)); c.appendChild(d);
    });
}

function playTrack(i) {
    const t = currentPlaylist[i];
    document.getElementById('player-title').textContent = t.title;
    document.getElementById('player-artist').textContent = t.artist;
    document.getElementById('player-cover').src = t.cover_url || 'https://via.placeholder.com/40/1db954/ffffff?text=♪';
    audio.src = t.audio_url; audio.play(); isPlaying = true;
    document.getElementById('play-btn').innerHTML = '<i class="fas fa-pause"></i>';
    supabase.from('tracks').update({ plays: (t.plays||0)+1 }).eq('id', t.id).then(loadTracks);
}

document.getElementById('play-btn').onclick = () => {
    if (!audio.src) return;
    isPlaying ? (audio.pause(), isPlaying = false, document.getElementById('play-btn').innerHTML = '<i class="fas fa-play"></i>') : (audio.play(), isPlaying = true, document.getElementById('play-btn').innerHTML = '<i class="fas fa-pause"></i>');
};
audio.onended = () => { document.getElementById('play-btn').innerHTML = '<i class="fas fa-play"></i>'; isPlaying = false; };
document.getElementById('volume-slider').oninput = e => audio.volume = e.target.value/100;

document.querySelectorAll('.nav-item').forEach(i => i.onclick = () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); i.classList.add('active');
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(i.dataset.page + '-page').classList.add('active');
});

document.getElementById('profile-btn').onclick = e => { e.stopPropagation(); document.getElementById('profile-menu').classList.toggle('hidden'); };
document.onclick = () => document.getElementById('profile-menu').classList.add('hidden');

document.getElementById('logout-btn').onclick = async e => { e.preventDefault(); await supabase.auth.signOut(); window.location.href = 'login.html'; };

document.getElementById('upload-form').onsubmit = async e => {
    e.preventDefault();
    const title = document.getElementById('track-title').value, artist = document.getElementById('track-artist').value;
    const audioFile = document.getElementById('track-file').files[0], coverFile = document.getElementById('track-cover').files[0];
    if (!audioFile) return alert('Выберите файл');
    const pd = document.getElementById('upload-progress'), pf = document.getElementById('progress-fill');
    pd.style.display = 'block';
    try {
        const fn = `${currentUser.id}/${Date.now()}_${audioFile.name}`;
        await supabase.storage.from('music').upload(fn, audioFile);
        const audioUrl = supabase.storage.from('music').getPublicUrl(fn).data.publicUrl;
        pf.style.width = '50%';
        let coverUrl = null;
        if (coverFile) {
            const cn = `${currentUser.id}/covers/${Date.now()}_${coverFile.name}`;
            await supabase.storage.from('music').upload(cn, coverFile);
            coverUrl = supabase.storage.from('music').getPublicUrl(cn).data.publicUrl;
        }
        await supabase.from('tracks').insert({ title, artist, artist_id: currentUser.id, audio_url: audioUrl, cover_url: coverUrl, plays: 0 });
        pf.style.width = '100%';
        setTimeout(() => { alert('Загружено!'); document.getElementById('upload-form').reset(); pd.style.display = 'none'; pf.style.width = '0%'; document.querySelector('[data-page="home"]').click(); loadTracks(); }, 500);
    } catch (er) { alert('Ошибка: ' + er.message); pd.style.display = 'none'; }
};
</script>
</body>
</html>
