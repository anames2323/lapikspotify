<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Spoofy • Музыка</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
        }
        
        /* Экраны */
        #auth-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, #0a0a0a 0%, #121212 100%);
        }
        #main-screen {
            display: none;
            grid-template-columns: 240px 1fr;
            grid-template-rows: 1fr 90px;
            height: 100vh;
        }
        
        /* Авторизация */
        .auth-card {
            background: #181818;
            padding: 30px 25px;
            border-radius: 16px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 32px;
            font-weight: 700;
            color: #1db954;
            margin-bottom: 25px;
        }
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.2s;
        }
        .auth-tab.active {
            background: #1db954;
            color: #000;
        }
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
        }
        .input-group {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 0 15px;
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            border: 1px solid #333;
        }
        .input-group i {
            color: #888;
            margin-right: 12px;
        }
        .input-group input {
            background: transparent;
            border: none;
            padding: 16px 0;
            color: #fff;
            font-size: 16px;
            width: 100%;
            outline: none;
        }
        .auth-btn {
            background: #1db954;
            color: #000;
            font-weight: 700;
            font-size: 16px;
            padding: 16px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .auth-btn:hover {
            background: #1ed760;
        }
        .auth-error {
            color: #ff4d4d;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
            min-height: 20px;
        }
        
        /* Главный экран */
        .sidebar {
            background: #000;
            grid-row: 1 / 3;
            padding: 24px 12px;
            border-right: 1px solid #282828;
        }
        .logo-small {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 25px;
            padding-left: 12px;
            color: #1db954;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            color: #b3b3b3;
            text-decoration: none;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
        }
        .nav-item:hover, .nav-item.active {
            color: #fff;
            background: #282828;
        }
        .main-content {
            background: linear-gradient(180deg, #1f1f1f 0%, #121212 100%);
            overflow-y: auto;
            padding: 0 30px 20px;
        }
        .top-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 16px 0;
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        .profile-btn {
            background: rgba(0,0,0,0.7);
            border: none;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 4px 12px 4px 4px;
            border-radius: 30px;
            cursor: pointer;
        }
        .profile-btn img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }
        .dropdown-menu {
            position: absolute;
            right: 30px;
            top: 65px;
            background: #282828;
            border-radius: 6px;
            padding: 4px;
            min-width: 160px;
        }
        .dropdown-menu.hidden {
            display: none;
        }
        .dropdown-menu a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            color: #fff;
            text-decoration: none;
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
        .tracklist {
            margin-top: 20px;
        }
        .track-item {
            display: grid;
            grid-template-columns: 40px 50px 2fr 1fr 80px;
            align-items: center;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            color: #b3b3b3;
            border-bottom: 1px solid #282828;
        }
        .track-item:hover {
            background: #282828;
            color: #fff;
        }
        .track-item img {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            object-fit: cover;
        }
        .track-name {
            color: #fff;
            font-weight: 500;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #b3b3b3;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
        }
        .player-bar {
            grid-column: 1 / 3;
            background: #181818;
            border-top: 1px solid #282828;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }
        .now-playing {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 25%;
        }
        .now-playing img {
            width: 45px;
            height: 45px;
            border-radius: 4px;
        }
        .player-center {
            display: flex;
            justify-content: center;
        }
        .play-btn {
            background: #fff;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
        }
        .player-right {
            width: 25%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
        }
        .empty-state {
            text-align: center;
            padding: 50px;
            color: #888;
        }
    </style>
</head>
<body>

<!-- ЭКРАН АВТОРИЗАЦИИ -->
<div id="auth-screen">
    <div class="auth-card">
        <div class="auth-logo">
            <i class="fab fa-spotify"></i>
            <span>Spoofy</span>
        </div>
        
        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Вход</button>
            <button class="auth-tab" data-tab="register">Регистрация</button>
        </div>

        <!-- Форма входа -->
        <form id="login-form" class="auth-form active">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="login-email" placeholder="Email" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="login-password" placeholder="Пароль" required>
            </div>
            <button type="submit" class="auth-btn">Войти</button>
            <div class="auth-error" id="login-error"></div>
        </form>

        <!-- Форма регистрации -->
        <form id="register-form" class="auth-form">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="reg-name" placeholder="Имя" required>
            </div>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="reg-email" placeholder="Email" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="reg-password" placeholder="Пароль (мин. 6)" required minlength="6">
            </div>
            <button type="submit" class="auth-btn">Зарегистрироваться</button>
            <div class="auth-error" id="reg-error"></div>
        </form>
    </div>
</div>

<!-- ГЛАВНЫЙ ЭКРАН -->
<div id="main-screen">
    <div class="sidebar">
        <div class="logo-small">
            <i class="fab fa-spotify"></i> Spoofy
        </div>
        <nav>
            <a class="nav-item active" data-page="home"><i class="fas fa-home"></i> Главная</a>
            <a class="nav-item" data-page="upload"><i class="fas fa-upload"></i> Загрузить</a>
        </nav>
    </div>

    <div class="main-content">
        <header class="top-bar">
            <div class="profile-dropdown">
                <button id="profile-btn" class="profile-btn">
                    <img id="user-avatar" src="https://i.pravatar.cc/40?img=7" alt="avatar">
                    <span id="user-display-name">User</span>
                    <i class="fas fa-chevron-down"></i>
                </button>
                <div id="profile-menu" class="dropdown-menu hidden">
                    <a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Выйти</a>
                </div>
            </div>
        </header>

        <div id="home-page" class="page active">
            <h1 style="margin:20px 0;">Популярные треки</h1>
            <div id="tracks-container" class="tracklist"></div>
        </div>

        <div id="upload-page" class="page">
            <h1 style="margin:20px 0;">Загрузить трек</h1>
            <form id="upload-form">
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" id="track-title" required>
                </div>
                <div class="form-group">
                    <label>Исполнитель</label>
                    <input type="text" id="track-artist" required>
                </div>
                <div class="form-group">
                    <label>Аудио (MP3)</label>
                    <input type="file" id="track-file" accept="audio/*" required>
                </div>
                <div class="form-group">
                    <label>Обложка</label>
                    <input type="file" id="track-cover" accept="image/*">
                </div>
                <div id="upload-progress" style="display:none; margin:10px 0;">
                    <div style="background:#333; height:4px; border-radius:2px;">
                        <div id="progress-fill" style="width:0%; height:100%; background:#1db954; border-radius:2px;"></div>
                    </div>
                    <span id="progress-text" style="color:#1db954;">0%</span>
                </div>
                <button type="submit" class="auth-btn">Загрузить</button>
            </form>
        </div>
    </div>

    <div class="player-bar">
        <div class="now-playing">
            <img id="player-cover" src="https://via.placeholder.com/40/1db954/ffffff?text=♪" alt="cover">
            <div>
                <div id="player-title">Не выбрано</div>
                <div id="player-artist" style="font-size:12px; color:#b3b3b3;">—</div>
            </div>
        </div>
        <div class="player-center">
            <button id="play-btn" class="play-btn"><i class="fas fa-play"></i></button>
        </div>
        <div class="player-right">
            <i class="fas fa-volume-up" style="color:#b3b3b3;"></i>
            <input type="range" id="volume-slider" min="0" max="100" value="70" style="width:80px;">
        </div>
    </div>
</div>

<script>
// КОНФИГУРАЦИЯ
const SUPABASE_URL = 'https://axocscfyyrtcegxvwal.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4b2NzY2Z5eXJ0Y2VneHZ3YWwiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0NTQ0MjE2MSwiZXhwIjoyMDYxMDE4MTYxfQ.LhT5jBx2RjGpGZqP9ZBjY8Z3lBmWk1iA2zFkV8ZQf1s';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let audio = new Audio();
let currentPlaylist = [];
let isPlaying = false;

// ПЕРЕКЛЮЧЕНИЕ ТАБОВ
document.querySelectorAll('.auth-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        
        const tabName = tab.dataset.tab;
        document.getElementById('login-form').classList.toggle('active', tabName === 'login');
        document.getElementById('register-form').classList.toggle('active', tabName === 'register');
        
        document.getElementById('login-error').textContent = '';
        document.getElementById('reg-error').textContent = '';
    });
});

// ПРОВЕРКА АВТОРИЗАЦИИ ПРИ ЗАГРУЗКЕ
async function init() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
        currentUser = session.user;
        showMainScreen();
    }
}
init();

// ВХОД
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errorEl = document.getElementById('login-error');
    
    if (!email || !password) {
        errorEl.textContent = 'Заполните все поля';
        return;
    }
    
    try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        
        currentUser = data.user;
        showMainScreen();
    } catch (error) {
        errorEl.textContent = 'Неверный email или пароль';
    }
});

// РЕГИСТРАЦИЯ
document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const errorEl = document.getElementById('reg-error');
    
    if (!name || !email || !password) {
        errorEl.textContent = 'Заполните все поля';
        return;
    }
    
    if (password.length < 6) {
        errorEl.textContent = 'Пароль должен быть не менее 6 символов';
        return;
    }
    
    try {
        const { data, error } = await supabase.auth.signUp({
            email,
            password,
            options: { data: { name, avatar_url: `https://i.pravatar.cc/150?u=${email}` } }
        });
        
        if (error) throw error;
        
        if (data.session) {
            currentUser = data.user;
            showMainScreen();
        } else {
            alert('Регистрация успешна! Теперь войдите.');
            document.querySelector('[data-tab="login"]').click();
        }
    } catch (error) {
        errorEl.textContent = error.message;
    }
});

// ПОКАЗАТЬ ГЛАВНЫЙ ЭКРАН
function showMainScreen() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'grid';
    
    const name = currentUser.user_metadata?.name || currentUser.email?.split('@')[0] || 'User';
    const avatar = currentUser.user_metadata?.avatar_url || `https://i.pravatar.cc/150?u=${currentUser.email}`;
    
    document.getElementById('user-display-name').textContent = name;
    document.getElementById('user-avatar').src = avatar;
    
    loadTracks();
}

// ЗАГРУЗКА ТРЕКОВ
async function loadTracks() {
    const { data } = await supabase.from('tracks').select('*').order('created_at', { ascending: false });
    currentPlaylist = data || [];
    
    const container = document.getElementById('tracks-container');
    container.innerHTML = '';
    
    if (currentPlaylist.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-music"></i><p>Нет треков</p></div>';
        return;
    }
    
    currentPlaylist.forEach((track, i) => {
        const div = document.createElement('div');
        div.className = 'track-item';
        div.innerHTML = `
            <span><i class="far fa-play-circle"></i></span>
            <img src="${track.cover_url || 'https://via.placeholder.com/40/1db954/ffffff?text=♪'}">
            <span class="track-name">${track.title}</span>
            <span>${track.artist}</span>
            <span><i class="fas fa-headphones"></i> ${track.plays || 0}</span>
        `;
        div.addEventListener('click', () => playTrack(i));
        container.appendChild(div);
    });
}

// ПЛЕЕР
function playTrack(index) {
    const track = currentPlaylist[index];
    document.getElementById('player-title').textContent = track.title;
    document.getElementById('player-artist').textContent = track.artist;
    document.getElementById('player-cover').src = track.cover_url || 'https://via.placeholder.com/40/1db954/ffffff?text=♪';
    
    audio.src = track.audio_url;
    audio.play();
    isPlaying = true;
    document.getElementById('play-btn').innerHTML = '<i class="fas fa-pause"></i>';
    
    supabase.from('tracks').update({ plays: (track.plays || 0) + 1 }).eq('id', track.id).then(() => loadTracks());
}

document.getElementById('play-btn').addEventListener('click', () => {
    if (!audio.src) return;
    if (isPlaying) {
        audio.pause();
        document.getElementById('play-btn').innerHTML = '<i class="fas fa-play"></i>';
    } else {
        audio.play();
        document.getElementById('play-btn').innerHTML = '<i class="fas fa-pause"></i>';
    }
    isPlaying = !isPlaying;
});

audio.addEventListener('ended', () => {
    document.getElementById('play-btn').innerHTML = '<i class="fas fa-play"></i>';
    isPlaying = false;
});

document.getElementById('volume-slider').addEventListener('input', (e) => {
    audio.volume = e.target.value / 100;
});

// НАВИГАЦИЯ
document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        item.classList.add('active');
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
