<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Spoofy • Главная</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="main-screen" class="main-screen">
        <div class="sidebar">
            <div class="logo-small">
                <i class="fab fa-spotify"></i> Spoofy
            </div>
            <nav>
                <a href="#" class="nav-item active" data-page="home"><i class="fas fa-home"></i> Главная</a>
                <a href="#" class="nav-item" data-page="upload"><i class="fas fa-upload"></i> Загрузить</a>
            </nav>
        </div>

        <div class="main-content">
            <header class="top-bar">
                <div></div>
                <div class="profile-dropdown">
                    <button id="profile-btn" class="profile-btn">
                        <img id="user-avatar" src="https://i.pravatar.cc/40?img=7" alt="avatar">
                        <span id="user-display-name">User</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div id="profile-menu" class="dropdown-menu hidden">
                        <a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Выйти</a>
                    </div>
                </div>
            </header>

            <div id="home-page" class="page active">
                <h1 style="margin:20px 0;">Популярные треки</h1>
                <div id="tracks-container" class="tracklist"></div>
            </div>

            <div id="upload-page" class="page">
                <h1 style="margin:20px 0;">Загрузить трек</h1>
                <form id="upload-form" class="upload-form">
                    <div class="form-group">
                        <label>Название</label>
                        <input type="text" id="track-title" required>
                    </div>
                    <div class="form-group">
                        <label>Исполнитель</label>
                        <input type="text" id="track-artist" required>
                    </div>
                    <div class="form-group">
                        <label>Аудио (MP3)</label>
                        <input type="file" id="track-file" accept="audio/*" required>
                    </div>
                    <div class="form-group">
                        <label>Обложка</label>
                        <input type="file" id="track-cover" accept="image/*">
                    </div>
                    <div id="upload-progress" style="display:none; margin:10px 0;">
                        <div style="background:#333; height:4px; border-radius:2px;">
                            <div id="progress-fill" style="width:0%; height:100%; background:#1db954; border-radius:2px;"></div>
                        </div>
                        <span id="progress-text" style="color:#1db954; font-size:12px;">0%</span>
                    </div>
                    <button type="submit" class="auth-btn" style="width:100%;">Загрузить</button>
                </form>
            </div>
        </div>

        <div class="player-bar">
            <div class="now-playing">
                <img id="player-cover" src="https://via.placeholder.com/40/1db954/ffffff?text=♪" alt="cover">
                <div>
                    <div id="player-title">Не выбрано</div>
                    <div id="player-artist" style="font-size:12px; color:#b3b3b3;">—</div>
                </div>
            </div>
            <div class="player-center">
                <button id="play-btn" class="play-btn"><i class="fas fa-play"></i></button>
            </div>
            <div class="player-right">
                <i class="fas fa-volume-up" style="color:#b3b3b3;"></i>
                <input type="range" id="volume-slider" min="0" max="100" value="70" style="width:80px;">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
