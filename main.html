<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>BluTube</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Roboto,Arial,sans-serif}
        body{background:#0f0f0f;color:#fff;height:100vh;overflow:hidden}
        #app{display:none;height:100vh;flex-direction:column}
        .header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:56px;background:#0f0f0f;border-bottom:1px solid #272727}
        .header-left{display:flex;align-items:center;gap:12px}
        .logo{display:flex;align-items:center;gap:6px;font-size:20px;font-weight:700;color:#3b82f6;cursor:pointer}
        .logo i{font-size:22px;background:#3b82f6;color:#fff;padding:6px;border-radius:6px}
        .search-bar{display:flex;align-items:center;flex:1;max-width:500px;margin:0 16px}
        .search-bar input{flex:1;padding:8px 14px;background:#121212;border:1px solid #303030;color:#fff;border-radius:20px 0 0 20px;outline:none;font-size:15px}
        .search-bar button{padding:8px 16px;background:#272727;border:1px solid #303030;color:#fff;border-radius:0 20px 20px 0;cursor:pointer}
        .header-right{display:flex;align-items:center;gap:8px}
        .icon-btn{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%}
        .icon-btn:hover{background:#272727}
        .user-btn{cursor:pointer;position:relative}
        .user-btn img{width:32px;height:32px;border-radius:50%;object-fit:cover}
        .dropdown{position:absolute;right:0;top:45px;background:#1a1a1a;border-radius:8px;padding:8px 0;min-width:200px;display:none;z-index:100}
        .dropdown.show{display:block}
        .dropdown a{display:flex;align-items:center;gap:14px;padding:12px 16px;color:#fff;text-decoration:none}
        .dropdown a:hover{background:#272727}
        .main-content{display:flex;flex:1;overflow:hidden}
        .sidebar{width:72px;background:#0f0f0f;padding:12px 0;display:flex;flex-direction:column;align-items:center;gap:14px;border-right:1px solid #272727}
        .sidebar-item{display:flex;flex-direction:column;align-items:center;gap:4px;color:#aaa;font-size:10px;cursor:pointer;padding:8px;border-radius:8px;width:64px;text-align:center}
        .sidebar-item:hover{background:#272727;color:#fff}
        .sidebar-item i{font-size:20px}
        .sidebar-item.active{color:#fff;background:#272727}
        .content{flex:1;overflow-y:auto;padding:20px}
        .video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
        @media(max-width:768px){.video-grid{grid-template-columns:1fr}}
        .video-card{cursor:pointer;transition:transform 0.2s}
        .video-card:hover{transform:translateY(-4px)}
        .thumb-wrap{width:100%;aspect-ratio:16/9;background:#272727;border-radius:12px;overflow:hidden}
        .thumb-wrap video,.thumb-wrap img{width:100%;height:100%;object-fit:cover}
        .video-info{display:flex;gap:12px;padding:10px 0}
        .channel-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;cursor:pointer;flex-shrink:0}
        .video-details h3{font-size:15px;margin-bottom:3px}.video-details p{font-size:13px;color:#aaa}
        .watch-page{display:none;padding:20px;flex:1;overflow-y:auto}
        .watch-page.active{display:flex;gap:20px}
        .watch-main{flex:1;max-width:100%}
        .video-container{position:relative;width:100%;background:#000;border-radius:12px;overflow:hidden}
        .watch-video{width:100%;aspect-ratio:16/9;display:block}
        .fullscreen-btn{background:rgba(0,0,0,0.7);border:none;color:#fff;font-size:18px;cursor:pointer;width:36px;height:36px;border-radius:4px;display:flex;align-items:center;justify-content:center}
        .fullscreen-btn:hover{background:rgba(0,0,0,0.9)}
        .watch-title{font-size:20px;font-weight:700;margin:12px 0 8px}
        .watch-info{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
        .channel-info{display:flex;align-items:center;gap:12px;cursor:pointer}.channel-info img{width:40px;height:40px;border-radius:50%}
        .subscribe-btn{padding:10px 20px;border-radius:20px;font-weight:700;cursor:pointer;border:none;font-size:14px}
        .subscribe-btn.sub{background:#3b82f6;color:#fff}.subscribe-btn.unsub{background:#272727;color:#fff}
        .like-buttons{display:flex;align-items:center;background:#272727;border-radius:20px;overflow:hidden}
        .like-buttons button{background:none;border:none;color:#fff;padding:8px 16px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:14px}
        .watch-desc{background:#272727;padding:12px;border-radius:12px;margin:16px 0;font-size:14px;white-space:pre-wrap}
        .comments-section{margin-top:24px}.comment-input{display:flex;gap:12px;margin-bottom:24px}
        .comment-input img{width:40px;height:40px;border-radius:50%}
        .comment-input input{flex:1;background:transparent;border:none;border-bottom:1px solid #3e3e3e;color:#fff;padding:8px 0;outline:none}
        .comment{display:flex;gap:12px;margin-bottom:12px}.comment img{width:40px;height:40px;border-radius:50%}
        .watch-sidebar{width:380px;display:flex;flex-direction:column;gap:12px}
        @media(max-width:768px){.watch-sidebar{display:none}}
        .page{display:none}.page.active{display:block}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;z-index:1000}
        .modal-content{background:#1a1a1a;padding:24px;border-radius:12px;width:90%;max-width:500px}
        .modal-content h2{margin-bottom:16px}.modal-content input,.modal-content textarea{width:100%;padding:12px;margin-bottom:14px;background:#272727;border:1px solid #3e3e3e;color:#fff;border-radius:8px;font-size:14px}
        .modal-content textarea{height:70px}.modal-content label{color:#aaa;margin-bottom:6px;display:block}
        .modal-buttons{display:flex;gap:10px}
        .btn-primary{flex:1;padding:12px;background:#3b82f6;border:none;border-radius:20px;color:#fff;font-weight:700;cursor:pointer}
        .btn-primary:disabled{opacity:0.5}.btn-secondary{flex:1;padding:12px;background:#272727;border:none;border-radius:20px;color:#fff;cursor:pointer}
        .upload-progress{margin:14px 0;display:none}.upload-bar{height:4px;background:#3e3e3e;border-radius:2px}
        .upload-fill{height:100%;background:#3b82f6;width:0%;border-radius:2px}
        .empty-state{text-align:center;padding:50px;color:#aaa}.subs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
        .sub-card{display:flex;align-items:center;gap:12px;padding:12px;background:#1a1a1a;border-radius:12px;cursor:pointer}
        .sub-card img{width:48px;height:48px;border-radius:50%}.sub-card h4{font-size:15px}
        #loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
        .spinner{width:48px;height:48px;border:3px solid #272727;border-top-color:#3b82f6;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:14px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .video-container:fullscreen{background:#000;display:flex;align-items:center;justify-content:center}
        .video-container:fullscreen .watch-video{width:100vw;height:100vh;aspect-ratio:auto}
    </style>
</head>
<body>
        <header class="header">
        <div class="header-left"><div class="logo" onclick="showPage('home')"><i class="fas fa-play"></i> BluTube</div></div>
        <div class="search-bar"><input type="text" id="searchInput" placeholder="Поиск..."><button onclick="searchVideos()"><i class="fas fa-search"></i></button></div>
        <div class="header-right">
            <button class="icon-btn" onclick="openUpload()"><i class="fas fa-video"></i></button>
            <div style="position:relative">
                <div class="user-btn" onclick="toggleMenu()"><img id="headerAvatar" src="https://i.pravatar.cc/32?img=7"></div>
                <div class="dropdown" id="userDropdown">
                    <a href="profile.html"><i class="fas fa-user"></i> Мой канал</a>
                    <a href="admin.html" id="adminPanelBtn" style="display:none"><i class="fas fa-shield"></i> Админ-панель</a>
                    <a href="#" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Выйти</a>
                </div>
            </div>
        </div>
    </header>
    <div class="main-content">
        <div class="sidebar">
            <div class="sidebar-item active" data-page="home"><i class="fas fa-home"></i>Главная</div>
            <div class="sidebar-item" data-page="shorts" onclick="window.location.href='shorts.html'"><i class="fas fa-mobile-alt"></i>Shorts</div>
            <div class="sidebar-item" data-page="trending"><i class="fas fa-fire"></i>Тренды</div>
            <div class="sidebar-item" data-page="subscriptions"><i class="fas fa-play"></i>Подписки</div>
            <div class="sidebar-item" data-page="liked"><i class="fas fa-heart"></i>Лайки</div>
            <div class="sidebar-item" data-page="history"><i class="fas fa-history"></i>История</div>
        </div>
        <div class="content">
            <div id="home-page" class="page active"><div class="video-grid" id="videoGrid"></div></div>
            <div id="trending-page" class="page"><h2>Тренды</h2><div class="video-grid" id="trendingGrid"></div></div>
            <div id="subscriptions-page" class="page"><h2>Подписки</h2><div class="subs-grid" id="subsGrid"></div></div>
            <div id="liked-page" class="page"><h2>Понравившиеся</h2><div class="video-grid" id="likedGrid"></div></div>
            <div id="history-page" class="page"><h2>История</h2><button class="btn-secondary" onclick="clearHistory()" style="margin-bottom:16px">Очистить</button><div class="video-grid" id="historyGrid"></div></div>
            <div class="watch-page" id="watchPage">
                <div class="watch-main">
                    <div class="video-container" id="videoContainer">
                        <video class="watch-video" id="watchVideo" controls></video>
                        <div style="position:absolute;bottom:10px;right:10px;display:flex;align-items:center;gap:8px;z-index:10">
                            <img id="watchWatermark" src="https://i.pravatar.cc/32?img=7" style="width:32px;height:32px;border-radius:50%;border:2px solid rgba(255,255,255,0.5);cursor:pointer" onclick="if(currentVideo)window.location.href='profile.html?id='+(currentVideo.artist_id||'')" title="Канал автора">
                            <button class="fullscreen-btn" onclick="toggleFullscreen()" title="Полный экран" style="position:static"><i class="fas fa-expand"></i></button>
                        </div>
                    </div>
                    <div class="watch-title" id="watchTitle"></div>
                    <div class="watch-info">
                        <div class="channel-info"><img id="watchChannelAvatar"><div><h4 id="watchChannelName"></h4><p id="watchSubsCount" style="font-size:12px;color:#aaa"></p></div><button class="subscribe-btn sub" id="watchSubscribeBtn" onclick="toggleSub()">Подписаться</button></div>
                        <div class="like-buttons"><button id="watchLikeBtn" onclick="toggleLike()"><i class="far fa-thumbs-up"></i> <span id="watchLikes">0</span></button><div style="width:1px;height:24px;background:#3e3e3e"></div><button><i class="far fa-thumbs-down"></i></button></div>
                    </div>
                    <div class="watch-desc" id="watchDesc"></div>
                    <div class="comments-section"><h3 id="commentsCount">Комментарии</h3>
                        <div class="comment-input"><img id="commentAvatar" src="https://i.pravatar.cc/40?img=7"><input type="text" id="commentInput" placeholder="Оставить комментарий..."><button class="icon-btn" onclick="addComment()"><i class="fas fa-paper-plane"></i></button></div>
                        <div id="commentsList"></div>
                    </div>
                </div>
                <div class="watch-sidebar" id="watchSidebar"></div>
            </div>
        </div>
    </div>
</div>
<div id="loading"><div class="spinner"></div><span>Загрузка BluTube...</span></div>
<div id="app">
    <div class="modal" id="uploadModal">
    <div class="modal-content">
        <h2>Загрузить видео</h2>
        <label>Название</label><input id="uploadTitle" placeholder="Название">
        <label>Описание</label><textarea id="uploadDesc" placeholder="Описание"></textarea>
        <label>Видео файл</label><input type="file" id="uploadVideoFile" accept="video/*">
        <label>Обложка</label><input type="file" id="uploadThumbFile" accept="image/*">
        <div class="upload-progress" id="uploadProgress"><div class="upload-bar"><div class="upload-fill" id="uploadFill"></div></div><span id="uploadPercent">0%</span></div>
        <div class="modal-buttons"><button class="btn-primary" id="confirmUpload" onclick="uploadVideo()">Загрузить</button><button class="btn-secondary" onclick="closeUpload()">Отмена</button></div>
    </div>
    </div>
    <script>
const SUPABASE_URL='https://axocsccfyyrtcegxvwal.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_Jga_s88V7TAEUSvHIFkMvA_DT5vG44E';
let currentUser=null,accessToken=null,currentVideo=null,allVideos=[],userAvatars={};
const ADMIN_EMAIL='radmirnoros@gmail.com';

window.toggleMenu=function(){document.getElementById('userDropdown').classList.toggle('show')}
window.openUpload=function(){document.getElementById('uploadModal').style.display='flex'}
window.closeUpload=function(){document.getElementById('uploadModal').style.display='none'}
window.doLogout=function(){localStorage.clear();window.location.href='login.html'}
document.addEventListener('click',function(e){if(!e.target.closest('.user-btn'))document.getElementById('userDropdown').classList.remove('show')})
window.toggleFullscreen=function(){var c=document.getElementById('videoContainer');if(!document.fullscreenElement){if(c.requestFullscreen)c.requestFullscreen()}else{if(document.exitFullscreen)document.exitFullscreen()}}
function getAvatar(aid){return userAvatars[aid]||'https://i.pravatar.cc/36?u='+(aid||'unknown')}

async function init(){
    console.log('init start');
    var t=localStorage.getItem('supabase_token'),u=localStorage.getItem('supabase_user');
    if(!t||!u){console.log('no token');window.location.href='login.html';return}
    accessToken=t;try{currentUser=JSON.parse(u)}catch(e){localStorage.clear();window.location.href='login.html';return}
    console.log('user:',currentUser.email);
    document.getElementById('loading').style.display='none';document.getElementById('app').style.display='flex';
    if(currentUser.email===ADMIN_EMAIL)document.getElementById('adminPanelBtn').style.display='flex';
    document.getElementById('headerAvatar').src=currentUser.user_metadata?.avatar_url||'https://i.pravatar.cc/32?img=7';
    document.getElementById('commentAvatar').src=currentUser.user_metadata?.avatar_url||'https://i.pravatar.cc/40?img=7';
    userAvatars[currentUser.id]=currentUser.user_metadata?.avatar_url||'https://i.pravatar.cc/32?img=7';
    setupSidebar();await refreshVideos();
    console.log('init done');
}
init();

function setupSidebar(){document.querySelectorAll('.sidebar-item').forEach(function(i){if(!i.onclick)i.addEventListener('click',function(){showPage(this.dataset.page)})})}
function showPage(p){
    console.log('showPage:',p);
    document.querySelectorAll('.sidebar-item').forEach(function(s){s.classList.remove('active')});
    var a=document.querySelector('.sidebar-item[data-page="'+p+'"]');if(a)a.classList.add('active');
    document.querySelectorAll('.page').forEach(function(px){px.classList.remove('active')});
    document.getElementById('watchPage').style.display='none';document.getElementById('watchPage').classList.remove('active');
    var el=document.getElementById(p+'-page');if(el)el.classList.add('active');
    if(p==='home')renderGrid(allVideos,'videoGrid');if(p==='trending')renderGrid(allVideos,'trendingGrid');
    if(p==='subscriptions')loadSubs();if(p==='liked')loadLiked();if(p==='history')loadHistory();
}
async function refreshVideos(){
    console.log('refreshVideos');
    try{var r=await fetch(SUPABASE_URL+'/rest/v1/videos?select=*&order=created_at.desc',{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}});var data=await r.json();allVideos=(Array.isArray(data)?data:[]).filter(function(v){return v.category!=='shorts'});console.log('videos loaded:',allVideos.length)}catch(e){allVideos=[];console.error(e)}
    renderGrid(allVideos,'videoGrid');renderGrid(allVideos,'trendingGrid');loadSubs();loadLiked();loadHistory();
}
function renderGrid(v,c){var g=document.getElementById(c);if(!g)return;if(!v||!v.length){g.innerHTML='<div class="empty-state">Нет видео</div>';return}g.innerHTML=v.map(function(x){return '<div class="video-card" onclick="watchVideo(\''+x.id+'\')"><div class="thumb-wrap">'+(x.thumbnail_url?'<img src="'+x.thumbnail_url+'">':'<video src="'+x.video_url+'" muted preload="metadata"></video>')+'</div><div class="video-info"><img class="channel-avatar" src="'+getAvatar(x.artist_id)+'"><div class="video-details"><h3>'+(x.title||'')+'</h3><p>'+(x.artist||'')+' • '+(x.views||0)+' просмотров</p></div></div></div>'}).join('')}
async function loadSubs(){try{var f=await fetch(SUPABASE_URL+'/rest/v1/follows?select=following_id&follower_id=eq.'+currentUser.id,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}});var d=await f.json();var ids=Array.isArray(d)?d.map(function(x){return x.following_id}):[];var h='';for(var uid of ids){var name=allVideos.find(function(v){return v.artist_id===uid})?.artist||'Пользователь';h+='<div class="sub-card" onclick="location.href=\'profile.html?id='+uid+'\'"><img src="'+getAvatar(uid)+'"><div><h4>'+name+'</h4><p>'+allVideos.filter(function(v){return v.artist_id===uid}).length+' видео</p></div></div>'}document.getElementById('subsGrid').innerHTML=h||'<div class="empty-state">Нет подписок</div>'}catch(e){}}
async function loadLiked(){try{var l=await fetch(SUPABASE_URL+'/rest/v1/likes?select=video_id&user_id=eq.'+currentUser.id,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}});var d=await l.json();var ids=Array.isArray(d)?d.map(function(x){return x.video_id}):[];renderGrid(allVideos.filter(function(v){return ids.includes(v.id)}),'likedGrid')}catch(e){}}
async function saveToHistory(id){await fetch(SUPABASE_URL+'/rest/v1/watch_history',{method:'POST',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({user_id:currentUser.id,video_id:id})}).catch(function(){})}
async function loadHistory(){try{var r=await fetch(SUPABASE_URL+'/rest/v1/watch_history?select=*,videos(*)&user_id=eq.'+currentUser.id+'&order=watched_at.desc&limit=50',{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}});renderGrid((await r.json()).map(function(h){return h.videos}).filter(Boolean),'historyGrid')}catch(e){}}
window.clearHistory=async function(){if(confirm('Очистить?')){await fetch(SUPABASE_URL+'/rest/v1/watch_history?user_id=eq.'+currentUser.id,{method:'DELETE',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}});loadHistory()}}
async function watchVideo(id){var v=allVideos.find(function(x){return x.id==id});if(!v)return;currentVideo=v;showWatchPage();document.getElementById('watchVideo').src=v.video_url;document.getElementById('watchWatermark').src=getAvatar(v.artist_id);document.getElementById('watchTitle').textContent=v.title||'';document.getElementById('watchChannelName').textContent=v.artist||'';document.getElementById('watchChannelAvatar').src=getAvatar(v.artist_id);document.getElementById('watchDesc').textContent=v.description||'';updateWatchStats();loadComments();loadSidebarVideos();fetch(SUPABASE_URL+'/rest/v1/videos?id=eq.'+v.id,{method:'PATCH',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({views:(v.views||0)+1})});saveToHistory(v.id)}
function showWatchPage(){document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});document.querySelectorAll('.sidebar-item').forEach(function(s){s.classList.remove('active')});document.getElementById('watchPage').classList.add('active');document.getElementById('watchPage').style.display='flex'}
async function updateWatchStats(){var l=await fetch(SUPABASE_URL+'/rest/v1/likes?select=*&video_id=eq.'+currentVideo.id,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken,'Prefer':'count=exact'}});document.getElementById('watchLikes').textContent=parseInt(l.headers.get('content-range')?.split('/')[1])||0;var liked=await fetch(SUPABASE_URL+'/rest/v1/likes?select=*&user_id=eq.'+currentUser.id+'&video_id=eq.'+currentVideo.id,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}});document.getElementById('watchLikeBtn').querySelector('i').className=(await liked.json()).length?'fas fa-thumbs-up':'far fa-thumbs-up';var f=await fetch(SUPABASE_URL+'/rest/v1/follows?select=*&follower_id=eq.'+currentUser.id+'&following_id=eq.'+currentVideo.artist_id,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}});var isF=(await f.json()).length>0;var sb=document.getElementById('watchSubscribeBtn');sb.textContent=isF?'Вы подписаны':'Подписаться';sb.className='subscribe-btn '+(isF?'unsub':'sub')}
window.toggleLike=async function(){if(!currentVideo)return;var l=await fetch(SUPABASE_URL+'/rest/v1/likes?select=*&user_id=eq.'+currentUser.id+'&video_id=eq.'+currentVideo.id,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}});var d=await l.json();if(d.length){await fetch(SUPABASE_URL+'/rest/v1/likes?user_id=eq.'+currentUser.id+'&video_id=eq.'+currentVideo.id,{method:'DELETE',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}})}else{await fetch(SUPABASE_URL+'/rest/v1/likes',{method:'POST',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({user_id:currentUser.id,video_id:currentVideo.id})})}updateWatchStats()}
window.toggleSub=async function(){if(!currentVideo)return;var f=await fetch(SUPABASE_URL+'/rest/v1/follows?select=*&follower_id=eq.'+currentUser.id+'&following_id=eq.'+currentVideo.artist_id,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}});var d=await f.json();if(d.length){await fetch(SUPABASE_URL+'/rest/v1/follows?follower_id=eq.'+currentUser.id+'&following_id=eq.'+currentVideo.artist_id,{method:'DELETE',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}})}else{await fetch(SUPABASE_URL+'/rest/v1/follows',{method:'POST',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({follower_id:currentUser.id,following_id:currentVideo.artist_id})})}updateWatchStats()}
async function loadComments(){var r=await fetch(SUPABASE_URL+'/rest/v1/comments?select=*&video_id=eq.'+currentVideo.id+'&order=created_at.desc',{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}});var c=await r.json();document.getElementById('commentsCount').textContent='Комментарии ('+(c?c.length:0)+')';document.getElementById('commentsList').innerHTML=(c||[]).map(function(x){return '<div class="comment"><img src="https://i.pravatar.cc/40?u='+x.user_id+'"><div><h4>Пользователь <span style="color:#aaa;font-size:12px">'+new Date(x.created_at).toLocaleDateString()+'</span></h4><p>'+x.text+'</p></div></div>'}).join('')||'<p style="color:#aaa">Нет комментариев</p>'}
window.addComment=async function(){var text=document.getElementById('commentInput').value.trim();if(!text)return;await fetch(SUPABASE_URL+'/rest/v1/comments',{method:'POST',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({user_id:currentUser.id,video_id:currentVideo.id,text:text})});document.getElementById('commentInput').value='';loadComments()}
async function loadSidebarVideos(){document.getElementById('watchSidebar').innerHTML=allVideos.filter(function(x){return x.id!==(currentVideo?.id)}).slice(0,10).map(function(v){return '<div class="video-card" onclick="watchVideo(\''+v.id+'\')"><div class="thumb-wrap">'+(v.thumbnail_url?'<img src="'+v.thumbnail_url+'">':'<video src="'+v.video_url+'" muted></video>')+'</div><div class="video-details"><h3>'+(v.title||'')+'</h3><p>'+(v.artist||'')+'</p></div></div>'}).join('')}
        window.uploadVideo=async function(){
    var title=document.getElementById('uploadTitle').value.trim(),vf=document.getElementById('uploadVideoFile').files[0],tf=document.getElementById('uploadThumbFile').files[0],desc=document.getElementById('uploadDesc').value.trim();
    if(!title||!vf){alert('Введите название и выберите видео');return}
    var btn=document.getElementById('confirmUpload');btn.disabled=true;btn.textContent='Загрузка...';document.getElementById('uploadProgress').style.display='block';
    try{
        var artist=currentUser.user_metadata?.name||currentUser.email?.split('@')[0]||'Пользователь',fd=new FormData();fd.append('file',vf);
        var fn='videos/'+currentUser.id+'/'+Date.now()+'_'+vf.name.replace(/[^a-zA-Z0-9.]/g,'_');
        await fetch(SUPABASE_URL+'/storage/v1/object/music/'+fn,{method:'POST',headers:{'Authorization':'Bearer '+accessToken,'apikey':SUPABASE_ANON_KEY},body:fd});
        document.getElementById('uploadFill').style.width='50%';document.getElementById('uploadPercent').textContent='50%';
        var vUrl=SUPABASE_URL+'/storage/v1/object/public/music/'+fn,tUrl=null;
        if(tf){var tfd=new FormData();tfd.append('file',tf);var tfn='thumbs/'+currentUser.id+'/'+Date.now()+'_'+tf.name;await fetch(SUPABASE_URL+'/storage/v1/object/music/'+tfn,{method:'POST',headers:{'Authorization':'Bearer '+accessToken,'apikey':SUPABASE_ANON_KEY},body:tfd});tUrl=SUPABASE_URL+'/storage/v1/object/public/music/'+tfn}
        document.getElementById('uploadFill').style.width='80%';document.getElementById('uploadPercent').textContent='80%';
        await fetch(SUPABASE_URL+'/rest/v1/videos',{method:'POST',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({title:title,artist:artist,artist_id:currentUser.id,video_url:vUrl,thumbnail_url:tUrl,description:desc,views:0,category:null})});
        document.getElementById('uploadFill').style.width='100%';document.getElementById('uploadPercent').textContent='✅';
        setTimeout(function(){document.getElementById('uploadModal').style.display='none';refreshVideos();showPage('home')},500);
    }catch(e){alert('Ошибка: '+e.message)}finally{btn.disabled=false;btn.textContent='Загрузить'}
};
async function searchVideos(){var q=document.getElementById('searchInput').value.toLowerCase();renderGrid(q?allVideos.filter(function(v){return(v.title||'').toLowerCase().includes(q)||(v.artist||'').toLowerCase().includes(q)}):allVideos,'videoGrid');showPage('home')}
</script>
</body>
