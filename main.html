<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>BluTube</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Roboto,Arial,sans-serif}
        :root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#272727;--text:#fff;--text2:#aaa;--accent:#3b82f6;--border:#272727}
        .light-theme{--bg:#fff;--bg2:#f2f2f2;--bg3:#e5e5e5;--text:#000;--text2:#666;--accent:#065fd4;--border:#ddd}
        body{background:var(--bg);color:var(--text);height:100vh;overflow:hidden;transition:background 0.3s,color 0.3s}
        #app{display:none;height:100vh;flex-direction:column}
        .header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:56px;background:var(--bg);border-bottom:1px solid var(--border)}
        .header-left{display:flex;align-items:center;gap:12px}
        .logo{display:flex;align-items:center;gap:6px;font-size:20px;font-weight:700;color:var(--accent);cursor:pointer;transition:transform 0.2s}
        .logo:hover{transform:scale(1.05)}
        .logo i{font-size:22px;background:var(--accent);color:#fff;padding:6px;border-radius:6px}
        .search-bar{display:flex;align-items:center;flex:1;max-width:500px;margin:0 16px}
        .search-bar input{flex:1;padding:8px 14px;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:20px 0 0 20px;outline:none;font-size:15px;transition:border 0.3s}
        .search-bar input:focus{border-color:var(--accent)}
        .search-bar button{padding:8px 16px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:0 20px 20px 0;cursor:pointer}
        .header-right{display:flex;align-items:center;gap:6px}
        .icon-btn{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background 0.2s}
        .icon-btn:hover{background:var(--bg3)}
        .user-btn{display:flex;align-items:center;cursor:pointer;position:relative}
        .user-btn img{width:32px;height:32px;border-radius:50%;object-fit:cover}
        .dropdown{position:absolute;right:0;top:40px;background:var(--bg2);border-radius:8px;padding:8px 0;min-width:220px;display:none;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,0.3);animation:fadeIn 0.2s ease}
        .dropdown.show{display:block}
        @keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeOut{from{opacity:1}to{opacity:0}}
        @keyframes scaleIn{from{transform:scale(0.9);opacity:0}to{transform:scale(1);opacity:1}}
        @keyframes likePop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
        @keyframes spin{to{transform:rotate(360deg)}}
        .dropdown a{display:flex;align-items:center;gap:14px;padding:12px 16px;color:var(--text);text-decoration:none;transition:background 0.2s}
        .dropdown a:hover{background:var(--bg3)}
        .main-content{display:flex;flex:1;overflow:hidden}
        .sidebar{width:72px;background:var(--bg);padding:12px 0;display:flex;flex-direction:column;align-items:center;gap:14px;border-right:1px solid var(--border)}
        .sidebar-item{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--text2);font-size:10px;cursor:pointer;padding:8px;border-radius:8px;width:64px;text-align:center;transition:0.2s}
        .sidebar-item:hover{background:var(--bg3);color:var(--text)}
        .sidebar-item i{font-size:20px}
        .sidebar-item.active{color:var(--text);background:var(--bg3)}
        .content{flex:1;overflow-y:auto;padding:20px}
        .video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
        @media(max-width:768px){.video-grid{grid-template-columns:1fr}}
        .video-card{cursor:pointer;animation:scaleIn 0.3s ease;transition:transform 0.2s}
        .video-card:hover{transform:translateY(-4px)}
        .thumb-wrap{position:relative;width:100%;aspect-ratio:16/9;background:var(--bg3);border-radius:12px;overflow:hidden}
        .thumb-wrap video,.thumb-wrap img{width:100%;height:100%;object-fit:cover}
        .video-info{display:flex;gap:12px;padding:10px 0}
        .channel-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;cursor:pointer;flex-shrink:0}
        .video-details h3{font-size:15px;margin-bottom:3px}
        .video-details p{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:4px}
        .verified-badge{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;background:#606060;border-radius:50%}
        .verified-badge i{font-size:8px;color:#0f0f0f}
        .watch-page{display:none;padding:20px;flex:1;overflow-y:auto}
        .watch-page.active{display:flex;gap:20px}
        .watch-main{flex:1;max-width:900px}
        .watch-video{width:100%;aspect-ratio:16/9;background:#000;border-radius:12px}
        .watch-title{font-size:20px;font-weight:700;margin:12px 0 8px}
        .watch-info{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
        .channel-info{display:flex;align-items:center;gap:12px;cursor:pointer}
        .channel-info img{width:40px;height:40px;border-radius:50%}
        .subscribe-btn{padding:10px 20px;border-radius:20px;font-weight:700;cursor:pointer;border:none;font-size:14px}
        .subscribe-btn.sub{background:var(--accent);color:#fff}.subscribe-btn.unsub{background:var(--bg3);color:var(--text)}
        .like-buttons{display:flex;align-items:center;background:var(--bg3);border-radius:20px;overflow:hidden}
        .like-buttons button{background:none;border:none;color:var(--text);padding:8px 16px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:14px}
        .like-buttons button:active{animation:likePop 0.3s ease}
        .watch-desc{background:var(--bg3);padding:12px;border-radius:12px;margin:16px 0;font-size:14px;white-space:pre-wrap;max-height:60px;overflow:hidden;cursor:pointer;transition:max-height 0.3s}
        .watch-desc.expanded{max-height:500px}
        .comments-section{margin-top:24px}
        .comment-input{display:flex;gap:12px;margin-bottom:24px}
        .comment-input img{width:40px;height:40px;border-radius:50%}
        .comment-input input{flex:1;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);padding:8px 0;outline:none}
        .comment{display:flex;gap:12px;margin-bottom:12px;position:relative}
        .comment img{width:40px;height:40px;border-radius:50%}
        .comment-body h4{font-size:14px}.comment-body p{font-size:14px;margin-bottom:8px}
        .comment-actions{display:flex;gap:16px;font-size:12px;color:var(--text2)}
        .comment-actions button{background:none;border:none;color:var(--text2);cursor:pointer;font-size:12px}
        .comment-delete{position:absolute;right:0;top:0;background:none;border:none;color:#666;cursor:pointer;opacity:0}
        .comment:hover .comment-delete{opacity:1}.comment-delete:hover{color:#ff4444}
        .replies{margin-left:52px}
        .reply-input{display:flex;gap:8px;margin-top:8px;display:none}
        .reply-input input{flex:1;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);padding:4px 0;outline:none;font-size:13px}
        .reply-input button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;font-weight:600}
        .watch-sidebar{width:380px;display:flex;flex-direction:column;gap:12px}
        @media(max-width:768px){.watch-sidebar{display:none}}
        .page{display:none}.page.active{display:block;animation:scaleIn 0.3s ease}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;z-index:1000}
        .modal-content{background:var(--bg2);padding:24px;border-radius:12px;width:90%;max-width:500px}
        .modal-content h2{margin-bottom:16px}.modal-content input,.modal-content textarea{width:100%;padding:12px;margin-bottom:14px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;font-size:14px}
        .modal-content textarea{height:70px}.modal-content label{color:var(--text2);margin-bottom:6px;display:block}
        .modal-buttons{display:flex;gap:10px}
        .btn-primary{flex:1;padding:12px;background:var(--accent);border:none;border-radius:20px;color:#fff;font-weight:700;cursor:pointer}
        .btn-secondary{flex:1;padding:12px;background:var(--bg3);border:none;border-radius:20px;color:var(--text);cursor:pointer}
        .upload-progress{margin:14px 0;display:none}.upload-bar{height:4px;background:var(--bg3);border-radius:2px}
        .upload-fill{height:100%;background:var(--accent);width:0%;border-radius:2px}
        .speed-menu{position:absolute;bottom:50px;right:10px;background:var(--bg2);border-radius:8px;padding:4px 0;display:none;z-index:10}
        .speed-menu button{display:block;width:100%;padding:8px 16px;background:none;border:none;color:var(--text);cursor:pointer;text-align:left}
        .speed-menu button:hover{background:var(--bg3)}.speed-menu button.active{color:var(--accent)}
        .autoplay-toggle{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:14px;color:var(--text2)}
        .autoplay-toggle input[type="checkbox"]{accent-color:var(--accent)}
        .empty-state{text-align:center;padding:50px;color:var(--text2)}.subs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
        .sub-card{display:flex;align-items:center;gap:12px;padding:12px;background:var(--bg2);border-radius:12px;cursor:pointer}
        .sub-card img{width:48px;height:48px;border-radius:50%}.sub-card h4{font-size:15px}
        #loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
        .spinner{width:48px;height:48px;border:3px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:14px}
    </style>
</head>
<body>
<div id="loading"><div class="spinner"></div><span>Загрузка BluTube...</span></div>
<div id="app">
        <header class="header">
        <div class="header-left"><div class="logo" onclick="showPage('home')"><i class="fas fa-play"></i> BluTube</div></div>
        <div class="search-bar"><input type="text" id="searchInput" placeholder="Поиск..."><button onclick="searchVideos()"><i class="fas fa-search"></i></button></div>
        <div class="header-right">
            <button class="icon-btn" id="themeToggle" title="Тема"><i class="fas fa-moon"></i></button>
            <button class="icon-btn" id="uploadBtn"><i class="fas fa-video"></i></button>
            <div class="user-btn" id="userMenuBtn"><img id="headerAvatar" src="https://i.pravatar.cc/32?img=7"></div>
            <div class="dropdown" id="userDropdown">
                <a href="profile.html"><i class="fas fa-user"></i> Мой канал</a>
                <a href="admin.html" id="adminPanelBtn" style="display:none"><i class="fas fa-shield"></i> Админ-панель</a>
                <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выйти</a>
            </div>
        </div>
    </header>
    <div class="main-content">
        <div class="sidebar">
            <div class="sidebar-item active" data-page="home"><i class="fas fa-home"></i>Главная</div>
            <div class="sidebar-item" data-page="trending"><i class="fas fa-fire"></i>Тренды</div>
            <div class="sidebar-item" data-page="subscriptions"><i class="fas fa-play"></i>Подписки</div>
            <div class="sidebar-item" data-page="liked"><i class="fas fa-heart"></i>Лайки</div>
            <div class="sidebar-item" data-page="history"><i class="fas fa-history"></i>История</div>
        </div>
        <div class="content">
            <div id="home-page" class="page active"><div class="video-grid" id="videoGrid"></div></div>
            <div id="trending-page" class="page"><h2>Тренды</h2><div class="video-grid" id="trendingGrid"></div></div>
            <div id="subscriptions-page" class="page"><h2>Подписки</h2><div class="subs-grid" id="subsGrid"></div></div>
            <div id="liked-page" class="page"><h2>Понравившиеся</h2><div class="video-grid" id="likedGrid"></div></div>
            <div id="history-page" class="page"><h2>История</h2><button class="btn-secondary" onclick="clearHistory()"><i class="fas fa-trash"></i> Очистить</button><div class="video-grid" id="historyGrid"></div></div>
            <div class="watch-page" id="watchPage">
                <div class="watch-main">
                    <div style="position:relative">
                        <video class="watch-video" id="watchVideo" controls></video>
                        <button class="icon-btn" id="speedBtn" style="position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,0.7)">1x</button>
                        <div class="speed-menu" id="speedMenu">
                            <button onclick="setSpeed(0.5)">0.5x</button><button onclick="setSpeed(0.75)">0.75x</button>
                            <button onclick="setSpeed(1)" class="active">1x</button><button onclick="setSpeed(1.25)">1.25x</button>
                            <button onclick="setSpeed(1.5)">1.5x</button><button onclick="setSpeed(2)">2x</button>
                        </div>
                    </div>
                    <div class="watch-title" id="watchTitle"></div>
                    <div class="watch-info">
                        <div class="channel-info"><img id="watchChannelAvatar"><div><h4 id="watchChannelName"></h4><p id="watchSubsCount" style="font-size:12px;color:var(--text2)"></p></div><button class="subscribe-btn sub" id="watchSubscribeBtn">Подписаться</button></div>
                        <div class="like-buttons"><button id="watchLikeBtn"><i class="far fa-thumbs-up"></i> <span id="watchLikes">0</span></button><div style="width:1px;height:24px;background:var(--border)"></div><button id="watchDislikeBtn"><i class="far fa-thumbs-down"></i></button></div>
                    </div>
                    <div class="watch-desc" id="watchDesc" onclick="this.classList.toggle('expanded')"></div>
                    <div class="autoplay-toggle"><input type="checkbox" id="autoplayCheck" checked><label for="autoplayCheck">Автовоспроизведение</label></div>
                    <div class="comments-section"><h3 id="commentsCount">Комментарии</h3>
                        <div class="comment-input"><img id="commentAvatar" src="https://i.pravatar.cc/40?img=7"><input type="text" id="commentInput" placeholder="Оставить комментарий..."><button class="icon-btn" onclick="addComment(null)"><i class="fas fa-paper-plane"></i></button></div>
                        <div id="commentsList"></div>
                    </div>
                </div>
                <div class="watch-sidebar" id="watchSidebar"></div>
            </div>
        </div>
    </div>
</div>
<div class="modal" id="uploadModal"><div class="modal-content"><h2>Загрузить видео</h2><label>Название</label><input id="uploadTitle"><label>Описание</label><textarea id="uploadDesc"></textarea><label>Видео</label><input type="file" id="uploadVideoFile" accept="video/*"><label>Обложка</label><input type="file" id="uploadThumbFile" accept="image/*"><div class="upload-progress" id="uploadProgress"><div class="upload-bar"><div class="upload-fill" id="uploadFill"></div></div><span id="uploadPercent">0%</span></div><div class="modal-buttons"><button class="btn-primary" id="confirmUpload">Загрузить</button><button class="btn-secondary" id="cancelUpload">Отмена</button></div></div></div>
<script>
const SUPABASE_URL='https://axocsccfyyrtcegxvwal.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_Jga_s88V7TAEUSvHIFkMvA_DT5vG44E';
let currentUser=null,accessToken=null,currentVideo=null,allVideos=[],userAvatars={},userNames={};
const ADMIN_EMAIL='radmirnoros@gmail.com';

// Тема
if(localStorage.getItem('blutube_theme')==='light')document.body.classList.add('light-theme');

async function init(){
    var t=localStorage.getItem('supabase_token'),u=localStorage.getItem('supabase_user');
    if(!t||!u){window.location.href='login.html';return}
    accessToken=t;try{currentUser=JSON.parse(u)}catch(e){localStorage.clear();window.location.href='login.html';return}
    document.getElementById('loading').style.display='none';document.getElementById('app').style.display='flex';
    if(currentUser.email===ADMIN_EMAIL)document.getElementById('adminPanelBtn').style.display='flex';
    var myAvatar=currentUser.user_metadata?.avatar_url||'https://i.pravatar.cc/32?img=7';
    document.getElementById('headerAvatar').src=myAvatar;document.getElementById('commentAvatar').src=myAvatar;
    userAvatars[currentUser.id]=myAvatar;userNames[currentUser.id]=currentUser.user_metadata?.name||currentUser.email?.split('@')[0];
    setupSidebar();setupEvents();await refreshVideos();
}
init();

function setupSidebar(){document.querySelectorAll('.sidebar-item').forEach(function(i){i.addEventListener('click',function(){showPage(this.dataset.page)})})}
function showPage(p){
    document.querySelectorAll('.sidebar-item').forEach(function(s){s.classList.remove('active')});
    var a=document.querySelector('.sidebar-item[data-page="'+p+'"]');if(a)a.classList.add('active');
    document.querySelectorAll('.page').forEach(function(px){px.classList.remove('active')});
    document.getElementById('watchPage').style.display='none';document.getElementById('watchPage').classList.remove('active');
    var el=document.getElementById(p+'-page');if(el)el.classList.add('active');
    if(p==='home')renderVideoGrid(allVideos,'videoGrid');if(p==='trending')renderVideoGrid(allVideos,'trendingGrid');
    if(p==='subscriptions')loadSubs();if(p==='liked')loadLiked();if(p==='history')loadHistory();
}
async function refreshVideos(){
    try{var r=await fetch(SUPABASE_URL+'/rest/v1/videos?select=*&order=created_at.desc',{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}});allVideos=Array.isArray(await r.json())?await r.json():[]}catch(e){allVideos=[]}
    renderVideoGrid(allVideos,'videoGrid');renderVideoGrid(allVideos,'trendingGrid');loadSubs();loadLiked();loadHistory();
}
function getAvatar(id){return userAvatars[id]||'https://i.pravatar.cc/36?u='+(id||'unknown')}
function getName(id){return userNames[id]||'Пользователь'}
function renderVideoGrid(v,c){var g=document.getElementById(c);if(!g||!v||!v.length){if(g)g.innerHTML='<div class="empty-state">Нет видео</div>';return}g.innerHTML=v.map(function(x){return '<div class="video-card" onclick="watchVideo(\''+x.id+'\')"><div class="thumb-wrap">'+(x.thumbnail_url?'<img src="'+x.thumbnail_url+'">':'<video src="'+x.video_url+'" muted preload="metadata"></video>')+'</div><div class="video-info"><img class="channel-avatar" src="'+getAvatar(x.artist_id)+'"><div class="video-details"><h3>'+(x.title||'')+'</h3><p>'+(x.artist||'')+' • '+(x.views||0)+' просмотров</p></div></div></div>'}).join('')}
async function loadSubs(){try{var f=await fetch(SUPABASE_URL+'/rest/v1/follows?select=following_id&follower_id=eq.'+currentUser.id,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}});var d=await f.json();var ids=Array.isArray(d)?d.map(function(x){return x.following_id}):[];var h='';for(var i=0;i<ids.length;i++){var uid=ids[i];h+='<div class="sub-card" onclick="window.location.href=\'profile.html?id='+uid+'\'"><img src="'+getAvatar(uid)+'"><div><h4>'+getName(uid)+'</h4><p>'+allVideos.filter(function(v){return v.artist_id===uid}).length+' видео</p></div></div>'}document.getElementById('subsGrid').innerHTML=h||'<div class="empty-state">Нет подписок</div>'}catch(e){}}
async function loadLiked(){try{var l=await fetch(SUPABASE_URL+'/rest/v1/likes?select=video_id&user_id=eq.'+currentUser.id,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}});var d=await l.json();var ids=Array.isArray(d)?d.map(function(x){return x.video_id}):[];renderVideoGrid(allVideos.filter(function(v){return ids.includes(v.id)}),'likedGrid')}catch(e){}}
async function saveToHistory(id){await fetch(SUPABASE_URL+'/rest/v1/watch_history',{method:'POST',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({user_id:currentUser.id,video_id:id})}).catch(function(){})}
async function loadHistory(){try{var r=await fetch(SUPABASE_URL+'/rest/v1/watch_history?select=*,videos(*)&user_id=eq.'+currentUser.id+'&order=watched_at.desc&limit=50',{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}});var data=await r.json();renderVideoGrid((data||[]).map(function(h){return h.videos}).filter(Boolean),'historyGrid')}catch(e){}}
window.clearHistory=async function(){if(confirm('Очистить?')){await fetch(SUPABASE_URL+'/rest/v1/watch_history?user_id=eq.'+currentUser.id,{method:'DELETE',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}});loadHistory()}}

async function watchVideo(id){
    var v=allVideos.find(function(x){return x.id==id});if(!v)return;currentVideo=v;showWatchPage();
    document.getElementById('watchVideo').src=v.video_url;document.getElementById('watchTitle').textContent=v.title||'';
    document.getElementById('watchChannelName').textContent=v.artist||'';document.getElementById('watchChannelAvatar').src=getAvatar(v.artist_id);
    document.getElementById('watchDesc').textContent=v.description||'Нет описания';updateWatchStats();loadComments();loadSidebarVideos();
    fetch(SUPABASE_URL+'/rest/v1/videos?id=eq.'+v.id,{method:'PATCH',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({views:(v.views||0)+1})});
    saveToHistory(v.id);
}
function showWatchPage(){document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});document.querySelectorAll('.sidebar-item').forEach(function(s){s.classList.remove('active')});document.getElementById('watchPage').classList.add('active');document.getElementById('watchPage').style.display='flex'}
async function updateWatchStats(){
    var l=await fetch(SUPABASE_URL+'/rest/v1/likes?select=*&video_id=eq.'+currentVideo.id,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken,'Prefer':'count=exact'}});
    document.getElementById('watchLikes').textContent=parseInt(l.headers.get('content-range')?.split('/')[1])||0;
    var liked=await fetch(SUPABASE_URL+'/rest/v1/likes?select=*&user_id=eq.'+currentUser.id+'&video_id=eq.'+currentVideo.id,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}});
    document.getElementById('watchLikeBtn').querySelector('i').className=(await liked.json()).length?'fas fa-thumbs-up':'far fa-thumbs-up';
    var f=await fetch(SUPABASE_URL+'/rest/v1/follows?select=*&follower_id=eq.'+currentUser.id+'&following_id=eq.'+currentVideo.artist_id,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}});
    var isF=(await f.json()).length>0;var sb=document.getElementById('watchSubscribeBtn');sb.textContent=isF?'Вы подписаны':'Подписаться';sb.className='subscribe-btn '+(isF?'unsub':'sub');
}
async function loadComments(){
    var r=await fetch(SUPABASE_URL+'/rest/v1/comments?select=*&video_id=eq.'+currentVideo.id+'&parent_id=is.null&order=created_at.desc',{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}});
    var c=await r.json();var rr=await fetch(SUPABASE_URL+'/rest/v1/comments?select=*&video_id=eq.'+currentVideo.id+'&parent_id=not.is.null&order=created_at.asc',{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}});
    var rep=await rr.json();document.getElementById('commentsCount').textContent='Комментарии ('+((c?c.length:0)+(rep?rep.length:0))+')';
    var h='';(c||[]).forEach(function(x){h+=renderComment(x,rep||[])});document.getElementById('commentsList').innerHTML=h||'<p style="color:var(--text2)">Нет комментариев</p>';
}
function renderComment(c,rep){
    var del=(currentUser.id===currentVideo.artist_id)||(currentUser.id===c.user_id);var child=rep.filter(function(r){return r.parent_id===c.id});
    var h='<div class="comment"><img src="https://i.pravatar.cc/40?u='+c.user_id+'"><div class="comment-body"><h4>'+getName(c.user_id)+' <span>'+new Date(c.created_at).toLocaleDateString()+'</span></h4><p>'+c.text+'</p><div class="comment-actions"><button onclick="showReply(\''+c.id+'\')"><i class="far fa-comment"></i> Ответить</button>'+(del?'<button onclick="deleteComment(\''+c.id+'\')"><i class="far fa-trash-alt"></i> Удалить</button>':'')+'</div><div class="reply-input" id="ri-'+c.id+'"><input id="rt-'+c.id+'" placeholder="Ответ..."><button onclick="addComment(\''+c.id+'\')">Ответить</button></div></div>';
    if(child.length){h+='<div class="replies">';child.forEach(function(r){h+=renderComment(r,rep)});h+='</div>'}h+='</div>';return h;
}
window.showReply=function(id){var el=document.getElementById('ri-'+id);el.style.display='flex';el.querySelector('input').focus()}
window.addComment=async function(pid){var text=pid?document.getElementById('rt-'+pid).value.trim():document.getElementById('commentInput').value.trim();if(!text)return;await fetch(SUPABASE_URL+'/rest/v1/comments',{method:'POST',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({user_id:currentUser.id,video_id:currentVideo.id,text:text,parent_id:pid||null})});if(!pid)document.getElementById('commentInput').value='';loadComments()}
window.deleteComment=async function(id){if(confirm('Удалить?')){await fetch(SUPABASE_URL+'/rest/v1/comments?id=eq.'+id,{method:'DELETE',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}});loadComments()}}
async function loadSidebarVideos(){var el=document.getElementById('watchSidebar');if(!el)return;el.innerHTML=allVideos.filter(function(x){return x.id!==(currentVideo?.id)}).slice(0,10).map(function(v){return '<div class="video-card" onclick="watchVideo(\''+v.id+'\')"><div class="thumb-wrap">'+(v.thumbnail_url?'<img src="'+v.thumbnail_url+'">':'<video src="'+v.video_url+'" muted></video>')+'</div><div class="video-details"><h3>'+(v.title||'')+'</h3><p>'+(v.artist||'')+'</p></div></div>'}).join('')}

// СКОРОСТЬ
window.setSpeed=function(s){var v=document.getElementById('watchVideo');v.playbackRate=s;document.getElementById('speedBtn').textContent=s+'x';document.querySelectorAll('.speed-menu button').forEach(function(b){b.classList.remove('active')});event.target.classList.add('active');document.getElementById('speedMenu').style.display='none'};
        </script>
        <script>
function setupEvents(){
    document.getElementById('userMenuBtn').addEventListener('click',function(e){e.stopPropagation();document.getElementById('userDropdown').classList.toggle('show')});
    document.addEventListener('click',function(){document.getElementById('userDropdown').classList.remove('show')});
    document.getElementById('logoutBtn').addEventListener('click',function(e){e.preventDefault();localStorage.clear();window.location.href='login.html'});
    document.getElementById('watchLikeBtn').addEventListener('click',async function(){if(!currentVideo)return;var l=await fetch(SUPABASE_URL+'/rest/v1/likes?select=*&user_id=eq.'+currentUser.id+'&video_id=eq.'+currentVideo.id,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}});var d=await l.json();if(d.length){await fetch(SUPABASE_URL+'/rest/v1/likes?user_id=eq.'+currentUser.id+'&video_id=eq.'+currentVideo.id,{method:'DELETE',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}})}else{await fetch(SUPABASE_URL+'/rest/v1/likes',{method:'POST',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({user_id:currentUser.id,video_id:currentVideo.id})})}updateWatchStats()});
    document.getElementById('watchSubscribeBtn').addEventListener('click',async function(){if(!currentVideo)return;var f=await fetch(SUPABASE_URL+'/rest/v1/follows?select=*&follower_id=eq.'+currentUser.id+'&following_id=eq.'+currentVideo.artist_id,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}});var d=await f.json();if(d.length){await fetch(SUPABASE_URL+'/rest/v1/follows?follower_id=eq.'+currentUser.id+'&following_id=eq.'+currentVideo.artist_id,{method:'DELETE',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}})}else{await fetch(SUPABASE_URL+'/rest/v1/follows',{method:'POST',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({follower_id:currentUser.id,following_id:currentVideo.artist_id})})}updateWatchStats()});
    
    // Тема
    document.getElementById('themeToggle').addEventListener('click',function(){document.body.classList.toggle('light-theme');localStorage.setItem('blutube_theme',document.body.classList.contains('light-theme')?'light':'dark');this.querySelector('i').className=document.body.classList.contains('light-theme')?'fas fa-sun':'fas fa-moon'});
    
    // Скорость
    document.getElementById('speedBtn').addEventListener('click',function(e){e.stopPropagation();document.getElementById('speedMenu').style.display='block'});
    document.addEventListener('click',function(){document.getElementById('speedMenu').style.display='none'});
    
    // Автовоспроизведение
    document.getElementById('watchVideo').addEventListener('ended',function(){if(document.getElementById('autoplayCheck').checked&&currentPlaylist.length>0){var next=allVideos[Math.floor(Math.random()*allVideos.length)];if(next)watchVideo(next.id)}});
    
    // Пробел = пауза
    document.addEventListener('keydown',function(e){if(e.code==='Space'&&document.activeElement.tagName!=='INPUT'){e.preventDefault();var v=document.getElementById('watchVideo');v.paused?v.play():v.pause();document.getElementById('playBtn').innerHTML=v.paused?'<i class="fas fa-play"></i>':'<i class="fas fa-pause"></i>'}});
    
    // Загрузка
    var um=document.getElementById('uploadModal');document.getElementById('uploadBtn').addEventListener('click',function(){um.style.display='flex'});
    document.getElementById('cancelUpload').addEventListener('click',function(){um.style.display='none'});
    document.getElementById('confirmUpload').addEventListener('click',async function(){
        var title=document.getElementById('uploadTitle').value.trim(),vf=document.getElementById('uploadVideoFile').files[0],tf=document.getElementById('uploadThumbFile').files[0],desc=document.getElementById('uploadDesc').value.trim();
        if(!title||!vf){alert('Введите название и выберите видео');return}
        var btn=this;btn.disabled=true;btn.textContent='Загрузка...';document.getElementById('uploadProgress').style.display='block';
        try{var artist=currentUser.user_metadata?.name||currentUser.email?.split('@')[0]||'Пользователь',fd=new FormData();fd.append('file',vf);var fn='videos/'+currentUser.id+'/'+Date.now()+'_'+vf.name.replace(/[^a-zA-Z0-9.]/g,'_');await fetch(SUPABASE_URL+'/storage/v1/object/music/'+fn,{method:'POST',headers:{'Authorization':'Bearer '+accessToken,'apikey':SUPABASE_ANON_KEY},body:fd});document.getElementById('uploadFill').style.width='50%';document.getElementById('uploadPercent').textContent='50%';var vUrl=SUPABASE_URL+'/storage/v1/object/public/music/'+fn,tUrl=null;if(tf){var tfd=new FormData();tfd.append('file',tf);var tfn='thumbs/'+currentUser.id+'/'+Date.now()+'_'+tf.name;await fetch(SUPABASE_URL+'/storage/v1/object/music/'+tfn,{method:'POST',headers:{'Authorization':'Bearer '+accessToken,'apikey':SUPABASE_ANON_KEY},body:tfd});tUrl=SUPABASE_URL+'/storage/v1/object/public/music/'+tfn}document.getElementById('uploadFill').style.width='80%';document.getElementById('uploadPercent').textContent='80%';await fetch(SUPABASE_URL+'/rest/v1/videos',{method:'POST',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({title:title,artist:artist,artist_id:currentUser.id,video_url:vUrl,thumbnail_url:tUrl,description:desc,views:0})});document.getElementById('uploadFill').style.width='100%';document.getElementById('uploadPercent').textContent='✅';setTimeout(function(){um.style.display='none';refreshVideos();showPage('home')},500)}catch(e){alert('Ошибка')}finally{btn.disabled=false;btn.textContent='Загрузить'}
    });
}
async function searchVideos(){var q=document.getElementById('searchInput').value.toLowerCase();if(!q)return renderVideoGrid(allVideos,'videoGrid');renderVideoGrid(allVideos.filter(function(v){return(v.title||'').toLowerCase().includes(q)||(v.artist||'').toLowerCase().includes(q)}),'videoGrid');showPage('home')}
</script>
