<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spoofy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,sans-serif}
        body{background:#000;color:#fff;height:100vh;overflow:hidden}
        #app{display:none;grid-template-columns:240px 1fr;grid-template-rows:1fr 90px;height:100vh}
        .sidebar{background:#000;padding:24px 12px}
        .logo{display:flex;align-items:center;gap:8px;font-size:24px;font-weight:700;margin-bottom:30px;padding-left:12px}
        .logo i{color:#1db954;font-size:28px}
        .nav-item{display:flex;align-items:center;gap:16px;padding:12px 16px;color:#b3b3b3;border-radius:6px;cursor:pointer}
        .nav-item i{font-size:20px;width:24px}
        .nav-item:hover{color:#fff}
        .nav-item.active{color:#fff;background:#1f1f1f}
        .main{background:#121212;overflow-y:auto}
        .main-content{padding:0 32px 32px}
        .top-bar{display:flex;justify-content:flex-end;padding:16px 32px;position:sticky;top:0;background:#121212;z-index:10}
        .user-btn{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.7);border:none;color:#fff;padding:4px 12px 4px 4px;border-radius:30px;cursor:pointer}
        .user-btn img{width:28px;height:28px;border-radius:50%}
        .dropdown{position:absolute;right:32px;top:65px;background:#282828;border-radius:4px;padding:4px;display:none;min-width:200px}
        .dropdown.show{display:block}
        .dropdown a{display:flex;align-items:center;gap:12px;padding:12px;color:#b3b3b3;text-decoration:none}
        .dropdown a:hover{background:#3e3e3e;color:#fff}
        .page{display:none;padding-top:20px}
        .page.active{display:block}
        .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:20px}
        .card{background:#181818;padding:16px;border-radius:8px;cursor:pointer}
        .card:hover{background:#282828}
        .card img{width:100%;aspect-ratio:1;border-radius:4px;margin-bottom:16px;object-fit:cover}
        .card h3{font-size:16px;margin-bottom:4px}
        .card p{font-size:14px;color:#b3b3b3}
        .tracks-header{display:grid;grid-template-columns:30px 50px 2fr 1fr 1fr 50px;padding:12px 16px;color:#b3b3b3;border-bottom:1px solid #282828}
        .track-row{display:grid;grid-template-columns:30px 50px 2fr 1fr 1fr 50px;padding:8px 16px;align-items:center;cursor:pointer}
        .track-row:hover{background:#282828}
        .track-row img{width:40px;height:40px;border-radius:4px}
        .track-title{color:#fff}
        .track-artist{color:#b3b3b3}
        .player{grid-column:1/3;background:#181818;border-top:1px solid #282828;display:flex;align-items:center;justify-content:space-between;padding:0 16px}
        .now-playing{display:flex;align-items:center;gap:14px;width:25%}
        .now-playing img{width:56px;height:56px;border-radius:4px}
        .player-controls{display:flex;flex-direction:column;align-items:center;width:50%}
        .player-buttons{display:flex;gap:16px;margin-bottom:8px}
        .player-buttons button{background:none;border:none;color:#b3b3b3;font-size:16px;cursor:pointer}
        .play-btn{background:#fff!important;color:#000!important;width:32px;height:32px;border-radius:50%!important}
        .progress-container{display:flex;align-items:center;gap:8px;width:100%}
        .progress-slider{flex:1;height:4px;background:#535353;border-radius:2px;cursor:pointer;position:relative}
        .progress-fill{position:absolute;left:0;top:0;width:0%;height:100%;background:#fff;border-radius:2px}
        .progress-slider:hover .progress-fill{background:#1db954}
        .volume-control{display:flex;align-items:center;gap:8px;width:25%;justify-content:flex-end}
        .volume-slider{width:100px;height:4px;background:#535353;border-radius:2px;cursor:pointer;position:relative}
        .volume-fill{position:absolute;left:0;top:0;width:70%;height:100%;background:#fff;border-radius:2px}
        .empty-state{text-align:center;padding:60px;color:#b3b3b3}
        #loading{display:flex;align-items:center;justify-content:center;height:100vh}
        .spinner{width:40px;height:40px;border:3px solid #282828;border-top-color:#1db954;border-radius:50%;animation:spin 1s linear infinite;margin-right:16px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;z-index:100}
        .modal-content{background:#282828;padding:30px;border-radius:8px;width:90%;max-width:500px}
        .modal-content input{width:100%;padding:12px;margin-bottom:12px;background:#1e1e1e;border:1px solid #3e3e3e;color:#fff;border-radius:4px}
        .modal-buttons{display:flex;gap:12px;margin-top:20px}
        .btn-primary{flex:1;padding:14px;background:#1db954;border:none;border-radius:30px;font-weight:bold;cursor:pointer}
        .btn-secondary{flex:1;padding:14px;background:transparent;border:1px solid #535353;color:#fff;border-radius:30px;cursor:pointer}
        .time-display{font-size:12px;color:#b3b3b3;min-width:40px}
    </style>
</head>
<body>
<div id="loading"><div class="spinner"></div><span>Загрузка...</span></div>
<div id="app">
    <div class="sidebar">
        <div class="logo"><i class="fab fa-spotify"></i> Spoofy</div>
        <nav>
            <a class="nav-item active" data-page="home"><i class="fas fa-home"></i> Главная</a>
            <a class="nav-item" data-page="library"><i class="fas fa-book-open"></i> Медиатека</a>
        </nav>
    </div>
    <div class="main">
        <header class="top-bar">
            <div style="position:relative">
                <button class="user-btn" id="userMenuBtn">
                    <img id="userAvatar" src="https://i.pravatar.cc/40?img=7">
                    <span id="userName">User</span>
                    <i class="fas fa-chevron-down"></i>
                </button>
                <div class="dropdown" id="userDropdown">
                    <a href="#" id="editProfileBtn"><i class="fas fa-user-edit"></i> Редактировать профиль</a>
                    <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выйти</a>
                </div>
            </div>
        </header>
        <div class="main-content">
            <div id="home-page" class="page active">
                <h1 style="margin:20px 0">Популярные треки</h1>
                <div class="cards-grid" id="popularGrid"></div>
            </div>
            <div id="library-page" class="page">
                <h1 style="margin:20px 0">Моя медиатека</h1>
                <button class="user-btn" id="uploadBtn"><i class="fas fa-plus"></i> Загрузить трек</button>
                <div id="myTracksList" style="margin-top:20px"></div>
            </div>
        </div>
    </div>
    <div class="player">
        <div class="now-playing">
            <img id="playerCover" src="https://via.placeholder.com/56/1db954/ffffff?text=♪">
            <div><h4 id="playerTitle">Не выбрано</h4><p id="playerArtist">—</p></div>
        </div>
        <div class="player-controls">
            <div class="player-buttons">
                <button class="play-btn" id="playBtn"><i class="fas fa-play"></i></button>
            </div>
            <div class="progress-container">
                <span class="time-display" id="currentTime">0:00</span>
                <div class="progress-slider" id="progressSlider"><div class="progress-fill" id="progressFill"></div></div>
                <span class="time-display" id="duration">0:00</span>
            </div>
        </div>
        <div class="volume-control">
            <i class="fas fa-volume-up"></i>
            <div class="volume-slider" id="volumeSlider"><div class="volume-fill" id="volumeFill"></div></div>
        </div>
    </div>
</div>

<!-- Модальное окно загрузки трека -->
<div class="modal" id="uploadModal">
    <div class="modal-content">
        <h2 style="margin-bottom:20px">Загрузить трек</h2>
        <input id="uploadTitle" placeholder="Название трека">
        <label style="color:#b3b3b3;margin:16px 0 8px;display:block">Аудио файл</label>
        <input type="file" id="uploadAudio" accept="audio/*">
        <label style="color:#b3b3b3;margin:16px 0 8px;display:block">Обложка</label>
        <input type="file" id="uploadCover" accept="image/*">
        <div id="uploadProgress" style="margin:16px 0"></div>
        <div class="modal-buttons">
            <button class="btn-primary" id="confirmUpload">Загрузить</button>
            <button class="btn-secondary" id="cancelUpload">Отмена</button>
        </div>
    </div>
</div>

<!-- Модальное окно редактирования профиля -->
<div class="modal" id="editProfileModal">
    <div class="modal-content">
        <h2 style="margin-bottom:20px">Редактировать профиль</h2>
        <input id="editName" placeholder="Имя">
        <input id="editAvatar" placeholder="URL аватара (необязательно)">
        <div id="editProfileProgress" style="margin:16px 0"></div>
        <div class="modal-buttons">
            <button class="btn-primary" id="confirmEditProfile">Сохранить</button>
            <button class="btn-secondary" id="cancelEditProfile">Отмена</button>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL='https://axocsccfyyrtcegxvwal.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_Jga_s88V7TAEUSvHIFkMvA_DT5vG44E';
let currentUser=null,accessToken=null,audio=new Audio(),currentPlaylist=[],isPlaying=!1;

async function init(){
    const t=localStorage.getItem('supabase_token'),u=localStorage.getItem('supabase_user');
    if(!t||!u){window.location.href='login.html';return}
    accessToken=t;currentUser=JSON.parse(u);
    document.getElementById('loading').style.display='none';
    document.getElementById('app').style.display='grid';
    updateUserUI();
    await loadTracks();
    setupEvents();
}

function updateUserUI(){
    const name=currentUser.user_metadata?.name||currentUser.email?.split('@')[0]||'User';
    const avatar=currentUser.user_metadata?.avatar_url||'https://i.pravatar.cc/40?img=7';
    document.getElementById('userName').textContent=name;
    document.getElementById('userAvatar').src=avatar;
}

async function loadTracks(){
    try{
        const r=await fetch(SUPABASE_URL+'/rest/v1/tracks?select=*&order=plays.desc&limit=10',{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}});
        const t=await r.json();currentPlaylist=t;
        renderCards(t,'popularGrid');
        const m=await fetch(SUPABASE_URL+'/rest/v1/tracks?select=*&artist_id=eq.'+currentUser.id+'&order=created_at.desc',{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}});
        renderTracks(await m.json(),'myTracksList');
    }catch(e){console.error(e)}
}

function renderCards(t,c){
    const g=document.getElementById(c);
    if(!t.length){g.innerHTML='<div class="empty-state">Нет треков</div>';return}
    g.innerHTML=t.map(t=>`<div class="card" data-id="${t.id}"><img src="${t.cover_url||'https://via.placeholder.com/150/1db954/ffffff?text=♪'}"><h3>${t.title}</h3><p>${t.artist}</p></div>`).join('');
    g.querySelectorAll('.card').forEach(c=>c.addEventListener('click',()=>{const tr=t.find(x=>x.id==c.dataset.id);if(tr)playTrack(tr)}))
}

function renderTracks(t,c){
    const g=document.getElementById(c);
    if(!t.length){g.innerHTML='<div class="empty-state">Нет треков</div>';return}
    let h='<div class="tracks-header"><span>#</span><span></span><span>Название</span><span>Исполнитель</span><span></span><span></span></div>';
    t.forEach((x,i)=>{h+=`<div class="track-row" data-id="${x.id}"><span>${i+1}</span><img src="${x.cover_url||'https://via.placeholder.com/40/1db954/ffffff?text=♪'}"><span class="track-title">${x.title}</span><span class="track-artist">${x.artist}</span><span></span><span><i class="fas fa-headphones"></i> ${x.plays||0}</span></div>`});
    g.innerHTML=h;
    g.querySelectorAll('.track-row').forEach(r=>r.addEventListener('click',()=>{const tr=t.find(x=>x.id==r.dataset.id);if(tr)playTrack(tr)}))
}

function playTrack(t){
    document.getElementById('playerTitle').textContent=t.title;
    document.getElementById('playerArtist').textContent=t.artist;
    document.getElementById('playerCover').src=t.cover_url||'https://via.placeholder.com/56/1db954/ffffff?text=♪';
    audio.src=t.audio_url;audio.play();isPlaying=!0;
    document.getElementById('playBtn').innerHTML='<i class="fas fa-pause"></i>';
    fetch(SUPABASE_URL+'/rest/v1/tracks?id=eq.'+t.id,{method:'PATCH',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({plays:(t.plays||0)+1})});
}

function setupEvents(){
    document.querySelectorAll('[data-page]').forEach(e=>e.addEventListener('click',ev=>{
        ev.preventDefault();
        document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
        e.classList.add('active');
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
        document.getElementById(e.dataset.page+'-page').classList.add('active');
    }));
    document.getElementById('userMenuBtn').addEventListener('click',e=>{e.stopPropagation();document.getElementById('userDropdown').classList.toggle('show')});
    document.addEventListener('click',()=>document.getElementById('userDropdown').classList.remove('show'));
    document.getElementById('logoutBtn').addEventListener('click',e=>{e.preventDefault();localStorage.clear();window.location.href='login.html'});
    document.getElementById('playBtn').addEventListener('click',()=>{if(!audio.src)return;isPlaying?(audio.pause(),document.getElementById('playBtn').innerHTML='<i class="fas fa-play"></i>'):(audio.play(),document.getElementById('playBtn').innerHTML='<i class="fas fa-pause"></i>');isPlaying=!isPlaying});
    
    audio.addEventListener('timeupdate',()=>{
        const p=(audio.currentTime/audio.duration)*100||0;
        document.getElementById('progressFill').style.width=p+'%';
        document.getElementById('currentTime').textContent=formatTime(audio.currentTime);
    });
    audio.addEventListener('loadedmetadata',()=>document.getElementById('duration').textContent=formatTime(audio.duration));
    audio.addEventListener('ended',()=>{document.getElementById('playBtn').innerHTML='<i class="fas fa-play"></i>';isPlaying=!1;document.getElementById('progressFill').style.width='0%';document.getElementById('currentTime').textContent='0:00'});
    
    document.getElementById('progressSlider').addEventListener('click',e=>{
        const r=e.currentTarget.getBoundingClientRect();
        const p=(e.clientX-r.left)/r.width;
        audio.currentTime=p*audio.duration;
    });
    
    document.getElementById('volumeSlider').addEventListener('click',e=>{
        const r=e.currentTarget.getBoundingClientRect();
        const p=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
        audio.volume=p;
        document.getElementById('volumeFill').style.width=(p*100)+'%';
    });
    
    // Загрузка трека
    const uploadModal=document.getElementById('uploadModal');
    document.getElementById('uploadBtn').addEventListener('click',()=>uploadModal.style.display='flex');
    document.getElementById('cancelUpload').addEventListener('click',()=>{uploadModal.style.display='none';clearUploadForm()});
    document.getElementById('confirmUpload').addEventListener('click',async()=>{
        const title=document.getElementById('uploadTitle').value;
        const af=document.getElementById('uploadAudio').files[0];
        const cf=document.getElementById('uploadCover').files[0];
        const p=document.getElementById('uploadProgress');
        if(!title||!af){p.innerHTML='<span style="color:#ff4d4d">Введите название и выберите файл</span>';return}
        p.innerHTML='Загрузка...';
        try{
            const artist=currentUser.user_metadata?.name||currentUser.email?.split('@')[0]||'User';
            const fd=new FormData();fd.append('file',af);
            const fn=Date.now()+'_'+af.name.replace(/[^a-zA-Z0-9.]/g,'_');
            await fetch(SUPABASE_URL+'/storage/v1/object/music/'+currentUser.id+'/'+fn,{method:'POST',headers:{'Authorization':'Bearer '+accessToken,'apikey':SUPABASE_ANON_KEY},body:fd});
            const aUrl=SUPABASE_URL+'/storage/v1/object/public/music/'+currentUser.id+'/'+fn;
            let cUrl=null;
            if(cf){
                const cfData=new FormData();cfData.append('file',cf);
                const cfn=Date.now()+'_'+cf.name.replace(/[^a-zA-Z0-9.]/g,'_');
                await fetch(SUPABASE_URL+'/storage/v1/object/music/'+currentUser.id+'/covers/'+cfn,{method:'POST',headers:{'Authorization':'Bearer '+accessToken,'apikey':SUPABASE_ANON_KEY},body:cfData});
                cUrl=SUPABASE_URL+'/storage/v1/object/public/music/'+currentUser.id+'/covers/'+cfn;
            }
            await fetch(SUPABASE_URL+'/rest/v1/tracks',{method:'POST',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({title,artist,artist_id:currentUser.id,audio_url:aUrl,cover_url:cUrl,plays:0})});
            p.innerHTML='<span style="color:#1db954">✅ Загружено!</span>';
            setTimeout(()=>{uploadModal.style.display='none';clearUploadForm();loadTracks()},1000);
        }catch(e){p.innerHTML='<span style="color:#ff4d4d">❌ '+e.message+'</span>'}
    });
    
    // Редактирование профиля
    const editModal=document.getElementById('editProfileModal');
    document.getElementById('editProfileBtn').addEventListener('click',e=>{
        e.preventDefault();
        document.getElementById('userDropdown').classList.remove('show');
        document.getElementById('editName').value=currentUser.user_metadata?.name||'';
        document.getElementById('editAvatar').value=currentUser.user_metadata?.avatar_url||'';
        editModal.style.display='flex';
    });
    document.getElementById('cancelEditProfile').addEventListener('click',()=>editModal.style.display='none');
    document.getElementById('confirmEditProfile').addEventListener('click',async()=>{
        const name=document.getElementById('editName').value.trim();
        const avatar=document.getElementById('editAvatar').value.trim();
        const p=document.getElementById('editProfileProgress');
        if(!name){p.innerHTML='<span style="color:#ff4d4d">Введите имя</span>';return}
        p.innerHTML='Сохранение...';
        try{
            const res=await fetch(SUPABASE_URL+'/auth/v1/user',{method:'PUT',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({data:{name,avatar_url:avatar||null}})});
            if(!res.ok)throw new Error('Ошибка обновления');
            currentUser.user_metadata={...currentUser.user_metadata,name,avatar_url:avatar||null};
            localStorage.setItem('supabase_user',JSON.stringify(currentUser));
            updateUserUI();
            p.innerHTML='<span style="color:#1db954">✅ Сохранено!</span>';
            setTimeout(()=>editModal.style.display='none',1000);
        }catch(e){p.innerHTML='<span style="color:#ff4d4d">❌ '+e.message+'</span>'}
    });
}

function clearUploadForm(){
    document.getElementById('uploadTitle').value='';
    document.getElementById('uploadAudio').value='';
    document.getElementById('uploadCover').value='';
    document.getElementById('uploadProgress').innerHTML='';
}

function formatTime(s){if(isNaN(s))return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+sec.toString().padStart(2,'0')}

init();
</script>
</body>
</html>
