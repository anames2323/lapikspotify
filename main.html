<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Spoofy • Главная</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background: #000; color: #fff; }
        #main-screen { display: none; grid-template-columns: 240px 1fr; grid-template-rows: 1fr 90px; height: 100vh; }
        .sidebar { background: #000; grid-row: 1/3; padding: 24px 12px; border-right: 1px solid #282828; }
        .logo-small { font-size: 22px; font-weight: 700; margin-bottom: 25px; padding-left: 12px; color: #1db954; display: flex; align-items: center; gap: 8px; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 12px 15px; color: #b3b3b3; text-decoration: none; border-radius: 6px; cursor: pointer; }
        .nav-item:hover, .nav-item.active { color: #fff; background: #282828; }
        .main-content { background: linear-gradient(180deg, #1f1f1f 0%, #121212 100%); overflow-y: auto; padding: 0 30px 20px; }
        .top-bar { display: flex; justify-content: flex-end; padding: 16px 0; position: sticky; top: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); z-index: 10; }
        .profile-btn { background: rgba(0,0,0,0.7); border: none; color: #fff; display: flex; align-items: center; gap: 10px; padding: 4px 12px 4px 4px; border-radius: 30px; cursor: pointer; }
        .profile-btn img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .dropdown-menu { position: absolute; right: 30px; top: 65px; background: #282828; border-radius: 6px; padding: 4px; min-width: 160px; }
        .dropdown-menu.hidden { display: none; }
        .dropdown-menu a { display: flex; align-items: center; gap: 10px; padding: 12px; color: #fff; text-decoration: none; }
        .dropdown-menu a:hover { background: #3e3e3e; }
        .page { display: none; }
        .page.active { display: block; }
        .tracklist { margin-top: 20px; }
        .track-item { display: grid; grid-template-columns: 40px 50px 2fr 1fr 80px; align-items: center; padding: 10px; border-radius: 6px; cursor: pointer; color: #b3b3b3; border-bottom: 1px solid #282828; }
        .track-item:hover { background: #282828; color: #fff; }
        .track-item img { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; }
        .track-name { color: #fff; font-weight: 500; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #b3b3b3; }
        .form-group input { width: 100%; padding: 12px; background: #1e1e1e; border: 1px solid #333; border-radius: 6px; color: #fff; }
        .auth-btn { background: #1db954; color: #000; font-weight: 700; padding: 16px; border: none; border-radius: 30px; cursor: pointer; width: 100%; }
        .player-bar { grid-column: 1/3; background: #181818; border-top: 1px solid #282828; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .now-playing { display: flex; align-items: center; gap: 12px; width: 25%; }
        .now-playing img { width: 45px; height: 45px; border-radius: 4px; object-fit: cover; }
        .play-btn { background: #fff; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
        .play-btn:hover { transform: scale(1.05); }
        .player-right { display: flex; align-items: center; gap: 10px; }
        .empty-state { text-align: center; padding: 50px; color: #888; }
    </style>
</head>
<body>

<div id="main-screen">
    <div class="sidebar">
        <div class="logo-small">
            <i class="fab fa-spotify"></i> Spoofy
        </div>
        <nav>
            <a class="nav-item active" data-page="home"><i class="fas fa-home"></i> Главная</a>
            <a class="nav-item" data-page="upload"><i class="fas fa-upload"></i> Загрузить</a>
        </nav>
    </div>

    <div class="main-content">
        <header class="top-bar">
            <div>
                <button id="profile-btn" class="profile-btn">
                    <img id="user-avatar" src="https://i.pravatar.cc/40?img=7" alt="avatar">
                    <span id="user-display-name">User</span>
                    <i class="fas fa-chevron-down"></i>
                </button>
                <div id="profile-menu" class="dropdown-menu hidden">
                    <a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Выйти</a>
                </div>
            </div>
        </header>

        <div id="home-page" class="page active">
            <h1 style="margin:20px 0;">Популярные треки</h1>
            <div id="tracks-container" class="tracklist"></div>
        </div>

        <div id="upload-page" class="page">
            <h1 style="margin:20px 0;">Загрузить трек</h1>
            <form id="upload-form">
                <div class="form-group">
                    <label>Название трека</label>
                    <input type="text" id="track-title" required>
                </div>
                <div class="form-group">
                    <label>Исполнитель</label>
                    <input type="text" id="track-artist" required>
                </div>
                <div class="form-group">
                    <label>Аудио файл (MP3, MP4, WAV)</label>
                    <input type="file" id="track-file" accept="audio/*" required>
                </div>
                <div class="form-group">
                    <label>Обложка (изображение)</label>
                    <input type="file" id="track-cover" accept="image/*">
                </div>
                <div id="upload-progress" style="display:none; margin:10px 0;">
                    <div style="background:#333; height:4px; border-radius:2px;">
                        <div id="progress-fill" style="width:0%; height:100%; background:#1db954; border-radius:2px;"></div>
                    </div>
                    <span id="progress-text" style="color:#1db954; font-size:12px;">0%</span>
                </div>
                <button type="submit" class="auth-btn">Загрузить трек</button>
            </form>
        </div>
    </div>

    <div class="player-bar">
        <div class="now-playing">
            <img id="player-cover" src="https://via.placeholder.com/45/1db954/ffffff?text=♪" alt="cover">
            <div>
                <div id="player-title">Не выбрано</div>
                <div id="player-artist" style="font-size:12px; color:#b3b3b3;">—</div>
            </div>
        </div>
        <div>
            <button id="play-btn" class="play-btn"><i class="fas fa-play"></i></button>
        </div>
        <div class="player-right">
            <i class="fas fa-volume-up" style="color:#b3b3b3;"></i>
            <input type="range" id="volume-slider" min="0" max="100" value="70" style="width:80px;">
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://axocscfyyrtcegxvwal.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4b2NzY2Z5eXJ0Y2VneHZ3YWwiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0NTQ0MjE2MSwiZXhwIjoyMDYxMDE4MTYxfQ.LhT5jBx2RjGpGZqP9ZBjY8Z3lBmWk1iA2zFkV8ZQf1s';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let audio = new Audio();
let currentPlaylist = [];
let isPlaying = false;

// Проверка авторизации
async function checkAuth() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
        window.location.href = 'login.html';
        return;
    }
    currentUser = session.user;
    document.getElementById('main-screen').style.display = 'grid';
    
    const name = currentUser.user_metadata?.name || currentUser.email?.split('@')[0] || 'User';
    const avatar = currentUser.user_metadata?.avatar_url || `https://i.pravatar.cc/150?u=${currentUser.email}`;
    document.getElementById('user-display-name').textContent = name;
    document.getElementById('user-avatar').src = avatar;
    
    loadTracks();
}
checkAuth();

// Загрузка треков
async function loadTracks() {
    const { data } = await supabase.from('tracks').select('*').order('created_at', { ascending: false });
    currentPlaylist = data || [];
    const container = document.getElementById('tracks-container');
    container.innerHTML = '';
    
    if (currentPlaylist.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-music"></i><p>Нет треков</p></div>';
        return;
    }
    
    currentPlaylist.forEach((track, i) => {
        const div = document.createElement('div');
        div.className = 'track-item';
        div.innerHTML = `
            <span><i class="far fa-play-circle"></i></span>
            <img src="${track.cover_url || 'https://via.placeholder.com/40/1db954/ffffff?text=♪'}" alt="${track.title}">
            <span class="track-name">${track.title}</span>
            <span>${track.artist}</span>
            <span><i class="fas fa-headphones"></i> ${track.plays || 0}</span>
        `;
        div.addEventListener('click', () => playTrack(i));
        container.appendChild(div);
    });
}

// Плеер
function playTrack(index) {
    const track = currentPlaylist[index];
    document.getElementById('player-title').textContent = track.title;
    document.getElementById('player-artist').textContent = track.artist;
    document.getElementById('player-cover').src = track.cover_url || 'https://via.placeholder.com/45/1db954/ffffff?text=♪';
    
    audio.src = track.audio_url;
    audio.play();
    isPlaying = true;
    document.getElementById('play-btn').innerHTML = '<i class="fas fa-pause"></i>';
    
    supabase.from('tracks').update({ plays: (track.plays || 0) + 1 }).eq('id', track.id).then(() => loadTracks());
}

document.getElementById('play-btn').addEventListener('click', () => {
    if (!audio.src) return;
    if (isPlaying) {
        audio.pause();
        document.getElementById('play-btn').innerHTML = '<i class="fas fa-play"></i>';
        isPlaying = false;
    } else {
        audio.play();
        document.getElementById('play-btn').innerHTML = '<i class="fas fa-pause"></i>';
        isPlaying = true;
    }
});

audio.addEventListener('ended', () => {
    document.getElementById('play-btn').innerHTML = '<i class="fas fa-play"></i>';
    isPlaying = false;
});

document.getElementById('volume-slider').addEventListener('input', (e) => {
    audio.volume = e.target.value / 100;
});

// Навигация
document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        item.classList.add('active');
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(item.dataset.page + '-page').classList.add('active');
    });
});

// Меню профиля
document.getElementById('profile-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    document.getElementById('profile-menu').classList.toggle('hidden');
});
document.addEventListener('click', () => document.getElementById('profile-menu').classList.add('hidden'));

// Выход
document.getElementById('logout-btn').addEventListener('click', async (e) => {
    e.preventDefault();
    await supabase.auth.signOut();
    window.location.href = 'login.html';
});

// Загрузка трека
document.getElementById('upload-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const title = document.getElementById('track-title').value.trim();
    const artist = document.getElementById('track-artist').value.trim();
    const audioFile = document.getElementById('track-file').files[0];
    const coverFile = document.getElementById('track-cover').files[0];
    
    if (!title || !artist) return alert('Заполните все поля');
    if (!audioFile) return alert('Выберите аудио файл');
    
    const progressDiv = document.getElementById('upload-progress');
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-text');
    
    progressDiv.style.display = 'block';
    
    try {
        // Загрузка аудио
        const audioFileName = `${currentUser.id}/${Date.now()}_${audioFile.name.replace(/[^a-zA-Z0-9.-]/g, '_')}`;
        await supabase.storage.from('music').upload(audioFileName, audioFile);
        const audioUrl = supabase.storage.from('music').getPublicUrl(audioFileName).data.publicUrl;
        
        progressFill.style.width = '50%';
        progressText.textContent = '50%';
        
        // Загрузка обложки
        let coverUrl = null;
        if (coverFile) {
            const coverFileName = `${currentUser.id}/covers/${Date.now()}_${coverFile.name.replace(/[^a-zA-Z0-9.-]/g, '_')}`;
            await supabase.storage.from('music').upload(coverFileName, coverFile);
            coverUrl = supabase.storage.from('music').getPublicUrl(coverFileName).data.publicUrl;
        }
        
        progressFill.style.width = '80%';
        progressText.textContent = '80%';
        
        // Сохранение в БД
        await supabase.from('tracks').insert({
            title,
            artist,
            artist_id: currentUser.id,
            audio_url: audioUrl,
            cover_url: coverUrl,
            plays: 0
        });
        
        progressFill.style.width = '100%';
        progressText.textContent = '100%';
        
        setTimeout(() => {
            alert('Трек успешно загружен!');
            document.getElementById('upload-form').reset();
            progressDiv.style.display = 'none';
            progressFill.style.width = '0%';
            progressText.textContent = '0%';
            document.querySelector('[data-page="home"]').click();
            loadTracks();
        }, 500);
        
    } catch (error) {
        alert('Ошибка загрузки: ' + error.message);
        progressDiv.style.display = 'none';
    }
});
</script>
</body>
  </html>
