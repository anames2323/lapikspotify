<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouClone • Профиль</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Roboto,Arial,sans-serif}
        body{background:#0f0f0f;color:#fff;min-height:100vh}
        .profile-banner{height:200px;background:linear-gradient(135deg,#cc0000,#ff4444)}
        .profile-header{display:flex;align-items:center;gap:24px;padding:0 48px;margin-top:-60px}
        .profile-avatar{width:120px;height:120px;border-radius:50%;border:4px solid #0f0f0f;object-fit:cover}
        .profile-info h1{font-size:32px;margin-bottom:4px}
        .profile-info p{color:#aaa;margin-bottom:12px}
        .btn{padding:10px 24px;border:none;border-radius:20px;font-weight:bold;cursor:pointer;font-size:14px}
        .btn-edit{background:#272727;color:#fff;margin-left:12px}
        .btn-edit:hover{background:#3e3e3e}
        .profile-tabs{display:flex;gap:32px;margin:24px 48px;border-bottom:1px solid #272727;padding-bottom:12px}
        .profile-tab{color:#aaa;cursor:pointer;padding-bottom:8px;border-bottom:2px solid transparent;font-weight:500}
        .profile-tab.active{color:#fff;border-bottom-color:#fff}
        .content{padding:0 48px}
        .video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
        .video-card{cursor:pointer}
        .thumb-wrap{width:100%;aspect-ratio:16/9;background:#272727;border-radius:12px;overflow:hidden}
        .thumb-wrap video,.thumb-wrap img{width:100%;height:100%;object-fit:cover}
        .video-info{padding:12px 0}
        .video-info h3{font-size:16px;margin-bottom:4px}
        .video-info p{font-size:14px;color:#aaa}
        .empty-state{text-align:center;padding:60px;color:#aaa}
        .empty-state i{font-size:48px;margin-bottom:16px;opacity:0.5}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;z-index:1000}
        .modal-content{background:#1a1a1a;padding:30px;border-radius:12px;width:90%;max-width:400px}
        .modal-content h2{margin-bottom:20px}
        .modal-content input{width:100%;padding:12px;margin-bottom:16px;background:#272727;border:1px solid #3e3e3e;color:#fff;border-radius:8px}
        .modal-buttons{display:flex;gap:12px}
        .btn-primary{flex:1;padding:12px;background:#f00;border:none;border-radius:20px;color:#fff;font-weight:bold;cursor:pointer}
        .btn-secondary{flex:1;padding:12px;background:#272727;border:none;border-radius:20px;color:#fff;cursor:pointer}
        .top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:#0f0f0f;border-bottom:1px solid #272727}
        .back-btn{display:flex;align-items:center;gap:8px;color:#fff;text-decoration:none;font-size:16px}
        .back-btn:hover{color:#f00}
        #loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
        .spinner{width:48px;height:48px;border:3px solid #272727;border-top-color:#f00;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
<div id="loading"><div class="spinner"></div><span>Загрузка...</span></div>

<div id="profileApp" style="display:none">
    <div class="top-bar">
        <a href="main.html" class="back-btn"><i class="fas fa-arrow-left"></i> На главную</a>
        <button class="btn btn-edit" onclick="openEditModal()"><i class="fas fa-pen"></i> Редактировать</button>
    </div>
    <div class="profile-banner"></div>
    <div class="profile-header">
        <img id="profileAvatar" class="profile-avatar" src="https://i.pravatar.cc/120?img=7">
        <div class="profile-info">
            <h1 id="profileName">Загрузка...</h1>
            <p id="profileStats"></p>
        </div>
    </div>
    <div class="profile-tabs">
        <div class="profile-tab active">Видео</div>
        <div class="profile-tab">О канале</div>
    </div>
    <div class="content">
        <div class="video-grid" id="profileVideos"></div>
    </div>
</div>

<div class="modal" id="editModal">
    <div class="modal-content">
        <h2>Редактировать профиль</h2>
        <label style="color:#aaa;margin-bottom:8px;display:block">Имя</label>
        <input type="text" id="editName" placeholder="Ваше имя">
        <label style="color:#aaa;margin-bottom:8px;display:block">URL аватара</label>
        <input type="text" id="editAvatar" placeholder="https://...">
        <div class="modal-buttons">
            <button class="btn-primary" onclick="saveProfile()">Сохранить</button>
            <button class="btn-secondary" onclick="closeEditModal()">Отмена</button>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL='https://axocsccfyyrtcegxvwal.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_Jga_s88V7TAEUSvHIFkMvA_DT5vG44E';
let currentUser=null,accessToken=null;

async function init(){
    const t=localStorage.getItem('supabase_token'),u=localStorage.getItem('supabase_user');
    if(!t||!u){window.location.href='login.html';return}
    accessToken=t;currentUser=JSON.parse(u);
    document.getElementById('loading').style.display='none';
    document.getElementById('profileApp').style.display='block';
    loadProfile();
}
init();

async function loadProfile(){
    const name=currentUser.user_metadata?.name||currentUser.email?.split('@')[0]||'Пользователь';
    const avatar=currentUser.user_metadata?.avatar_url||'https://i.pravatar.cc/120?img=7';
    document.getElementById('profileName').textContent=name;
    document.getElementById('profileAvatar').src=avatar;
    
    const r=await fetch(SUPABASE_URL+'/rest/v1/videos?select=*&artist_id=eq.'+currentUser.id+'&order=created_at.desc',{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}});
    const videos=await r.json()||[];
    
    const f=await fetch(SUPABASE_URL+'/rest/v1/follows?select=*&following_id=eq.'+currentUser.id,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken,'Prefer':'count=exact'}});
    const fCount=parseInt(f.headers.get('content-range')?.split('/')[1])||0;
    document.getElementById('profileStats').textContent=fCount+' подписчиков • '+videos.length+' видео';
    
    const g=document.getElementById('profileVideos');
    if(!videos.length){g.innerHTML='<div class="empty-state"><i class="fas fa-video"></i><p>Нет видео</p></div>';return}
    g.innerHTML=videos.map(v=>`<div class="video-card" onclick="window.location.href='main.html?watch=${v.id}'"><div class="thumb-wrap">${v.thumbnail_url?`<img src="${v.thumbnail_url}">`:`<video src="${v.video_url}" muted preload="metadata"></video>`}</div><div class="video-info"><h3>${v.title}</h3><p>${v.views||0} просмотров</p></div></div>`).join('');
}

function openEditModal(){
    document.getElementById('editName').value=currentUser.user_metadata?.name||'';
    document.getElementById('editAvatar').value=currentUser.user_metadata?.avatar_url||'';
    document.getElementById('editModal').style.display='flex';
}
function closeEditModal(){document.getElementById('editModal').style.display='none'}

async function saveProfile(){
    const name=document.getElementById('editName').value.trim();
    const avatar=document.getElementById('editAvatar').value.trim();
    if(!name)return;
    await fetch(SUPABASE_URL+'/auth/v1/user',{method:'PUT',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({data:{name,avatar_url:avatar||null}})});
    currentUser.user_metadata={...currentUser.user_metadata,name,avatar_url:avatar||null};
    localStorage.setItem('supabase_user',JSON.stringify(currentUser));
    loadProfile();closeEditModal();
}
</script>
</body>
</html>
