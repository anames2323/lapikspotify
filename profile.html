<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BluTube • Профиль</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Roboto,Arial,sans-serif}
        :root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#272727;--text:#fff;--text2:#aaa;--accent:#3b82f6;--border:#272727}
        body{background:var(--bg);color:var(--text);min-height:100vh}
        .top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:var(--bg);border-bottom:1px solid var(--border)}
        .back-btn{color:var(--text);text-decoration:none;font-size:16px;display:flex;align-items:center;gap:8px}.back-btn:hover{color:var(--accent)}
        .logo{color:var(--accent);font-weight:700;font-size:20px}
        .btn{padding:8px 18px;border:none;border-radius:20px;font-weight:600;cursor:pointer;font-size:13px;margin-left:8px;transition:0.2s}
        .btn-edit{background:var(--bg3);color:var(--text)}.btn-edit:hover{background:#3e3e3e}
        .btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
        .btn-accent{background:var(--accent);color:#fff}
        .profile-banner{height:200px;background:linear-gradient(135deg,#1e3a5f,#3b82f6);position:relative;cursor:pointer;background-size:cover;background-position:center}
        .profile-banner:hover .banner-overlay{opacity:1}
        .banner-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:16px;opacity:0;transition:0.3s;background:rgba(0,0,0,0.3);font-size:18px}
        .banner-overlay label{cursor:pointer;color:#fff}.banner-overlay button{background:none;border:none;color:#fff;cursor:pointer;font-size:18px}.banner-overlay button:hover{color:#ff4444}
        .profile-header{display:flex;align-items:flex-end;gap:24px;padding:0 48px;margin-top:-60px;flex-wrap:wrap}
        .profile-avatar{width:120px;height:120px;border-radius:50%;border:4px solid var(--bg);object-fit:cover}
        .profile-info{flex:1}
        .profile-info h1{font-size:32px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
        .profile-info p{color:var(--text2);margin-bottom:8px}
        .profile-actions{display:flex;gap:8px;flex-wrap:wrap}
        .channel-tabs{display:flex;gap:24px;margin:24px 48px 0;border-bottom:1px solid var(--border)}
        .channel-tab{color:var(--text2);cursor:pointer;padding:12px 0;font-weight:500;border-bottom:2px solid transparent;transition:0.2s;display:flex;align-items:center;gap:8px}
        .channel-tab:hover{color:var(--text)}.channel-tab.active{color:var(--text);border-bottom-color:var(--accent)}
        .content{padding:24px 48px}
        .video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
        @media(max-width:768px){.video-grid{grid-template-columns:1fr}.content{padding:16px}.profile-header{padding:0 16px}.channel-tabs{margin:24px 16px 0}}
        .video-card{cursor:pointer;animation:scaleIn 0.3s ease;transition:transform 0.2s}
        .video-card:hover{transform:translateY(-4px)}
        @keyframes scaleIn{from{transform:scale(0.9);opacity:0}to{transform:scale(1);opacity:1}}
        .thumb-wrap{width:100%;aspect-ratio:16/9;background:var(--bg3);border-radius:12px;overflow:hidden}
        .thumb-wrap video,.thumb-wrap img{width:100%;height:100%;object-fit:cover}
        .video-info{padding:10px 0}.video-info h3{font-size:15px;margin-bottom:4px}.video-info p{color:var(--text2)}
        .about-section{max-width:600px}
        .about-section h3{font-size:20px;margin:24px 0 12px}
        .about-section p{color:var(--text2);line-height:1.6;margin-bottom:16px}
        .about-section .detail{display:flex;align-items:center;gap:8px;margin-bottom:12px;color:var(--text2)}
        .about-section .detail i{width:24px;color:var(--accent)}
        .about-section textarea{width:100%;padding:12px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;margin:12px 0;resize:vertical;min-height:80px}
        .stats-row{display:flex;gap:24px;margin:24px 0;flex-wrap:wrap}
        .stat-box{background:var(--bg2);padding:20px;border-radius:12px;text-align:center;min-width:150px;flex:1}
        .stat-box h2{font-size:28px;color:var(--accent)}
        .stat-box p{color:var(--text2);font-size:14px}
        .playlist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
        .playlist-card{background:var(--bg2);border-radius:12px;overflow:hidden;cursor:pointer;transition:0.2s}
        .playlist-card:hover{background:var(--bg3);transform:translateY(-2px)}
        .playlist-thumb{width:100%;aspect-ratio:16/9;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:40px}
        .playlist-info{padding:12px}.playlist-info h4{font-size:15px}.playlist-info p{color:var(--text2);font-size:13px}
        .empty-state{text-align:center;padding:60px;color:var(--text2)}.empty-state i{font-size:48px;margin-bottom:16px;opacity:0.5}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;z-index:1000}
        .modal-content{background:var(--bg2);padding:30px;border-radius:12px;width:90%;max-width:450px;animation:scaleIn 0.3s ease}
        .modal-content h2{margin-bottom:20px}.modal-content input,.modal-content textarea,.modal-content select{width:100%;padding:12px;margin-bottom:14px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;font-size:14px}
        .modal-content textarea{min-height:80px;resize:vertical}.modal-content label{color:var(--text2);margin-bottom:6px;display:block}
        .modal-buttons{display:flex;gap:10px}
        .btn-primary{flex:1;padding:12px;background:var(--accent);border:none;border-radius:20px;color:#fff;font-weight:700;cursor:pointer}
        .btn-secondary{flex:1;padding:12px;background:var(--bg3);border:none;border-radius:20px;color:var(--text);cursor:pointer}
        #loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
        .spinner{width:48px;height:48px;border:3px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
<div id="loading"><div class="spinner"></div></div>
<div id="profileApp" style="display:none">
    <div class="top-bar">
        <a href="main.html" class="back-btn"><i class="fas fa-arrow-left"></i> На главную</a>
        <div class="logo">BluTube</div>
        <div>
            <button class="btn btn-edit" onclick="openEditModal()"><i class="fas fa-pen"></i> Редактировать</button>
            <button class="btn btn-danger" onclick="deleteBanner()"><i class="fas fa-trash"></i> Баннер</button>
        </div>
    </div>
    <div class="profile-banner" id="profileBanner">
        <div class="banner-overlay">
            <label for="bannerFile"><i class="fas fa-camera"></i> Сменить</label>
            <button onclick="deleteBanner()"><i class="fas fa-trash"></i> Удалить</button>
        </div>
        <input type="file" id="bannerFile" accept="image/*" onchange="uploadBanner()" style="display:none">
    </div>
    <div class="profile-header">
        <img id="profileAvatar" class="profile-avatar" src="https://i.pravatar.cc/120?img=7">
        <div class="profile-info">
            <h1 id="profileName"></h1>
            <p id="profileStats"></p>
            <div class="profile-actions">
                <button class="btn btn-accent" onclick="openEditModal()">Настроить канал</button>
            </div>
        </div>
    </div>
    <div class="channel-tabs">
        <div class="channel-tab active" data-tab="videos"><i class="fas fa-video"></i> Видео</div>
        <div class="channel-tab" data-tab="about"><i class="fas fa-info-circle"></i> О канале</div>
        <div class="channel-tab" data-tab="playlists"><i class="fas fa-list"></i> Плейлисты</div>
        <div class="channel-tab" data-tab="analytics"><i class="fas fa-chart-bar"></i> Аналитика</div>
    </div>
    <div class="content" id="tabContent"></div>
</div>

<!-- Модалка редактирования -->
<div class="modal" id="editModal">
    <div class="modal-content">
        <h2>Настройки канала</h2>
        <label>Имя канала</label><input type="text" id="editName">
        <label>Описание</label><textarea id="editDesc" placeholder="Расскажите о своём канале..."></textarea>
        <label>Страна</label><input type="text" id="editCountry" placeholder="Россия">
        <label>Ссылка (соцсеть/сайт)</label><input type="text" id="editLink" placeholder="https://...">
        <label>Аватар</label><input type="file" id="editAvatarFile" accept="image/*">
        <div class="modal-buttons">
            <button class="btn-primary" onclick="saveProfile()">Сохранить</button>
            <button class="btn-secondary" onclick="closeEditModal()">Отмена</button>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL='https://axocsccfyyrtcegxvwal.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_Jga_s88V7TAEUSvHIFkMvA_DT5vG44E';
let currentUser=null,accessToken=null,profileVideos=[],channelSettings={};

async function init(){
    var t=localStorage.getItem('supabase_token'),u=localStorage.getItem('supabase_user');
    if(!t||!u){window.location.href='login.html';return}
    accessToken=t;currentUser=JSON.parse(u);
    channelSettings=JSON.parse(localStorage.getItem('channel_'+currentUser.id)||'{}');
    document.getElementById('loading').style.display='none';document.getElementById('profileApp').style.display='block';
    loadProfile();showTab('videos');
}init();

async function loadProfile(){
    var name=currentUser.user_metadata?.name||currentUser.email?.split('@')[0]||'Пользователь';
    document.getElementById('profileName').textContent=name;
    document.getElementById('profileAvatar').src=currentUser.user_metadata?.avatar_url||'https://i.pravatar.cc/120?img=7';
    var banner=currentUser.user_metadata?.banner_url;if(banner)document.getElementById('profileBanner').style.backgroundImage='url('+banner+')';
    var r=await fetch(SUPABASE_URL+'/rest/v1/videos?select=*&artist_id=eq.'+currentUser.id+'&order=created_at.desc',{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken}});
    profileVideos=(await r.json())||[];
    var f=await fetch(SUPABASE_URL+'/rest/v1/follows?select=*&following_id=eq.'+currentUser.id,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken,'Prefer':'count=exact'}});
    var fCount=parseInt(f.headers.get('content-range')?.split('/')[1])||0;
    document.getElementById('profileStats').textContent=fCount+' подписчиков • '+profileVideos.length+' видео';
}

function showTab(tab){
    document.querySelectorAll('.channel-tab').forEach(function(t){t.classList.remove('active')});
    document.querySelector('.channel-tab[data-tab="'+tab+'"]').classList.add('active');
    var c=document.getElementById('tabContent');
    if(tab==='videos')loadVideosTab(c);
    else if(tab==='about')loadAboutTab(c);
    else if(tab==='playlists')loadPlaylistsTab(c);
    else if(tab==='analytics')loadAnalyticsTab(c);
}
document.querySelectorAll('.channel-tab').forEach(function(t){t.addEventListener('click',function(){showTab(this.dataset.tab)})});

function loadVideosTab(c){
    if(!profileVideos.length){c.innerHTML='<div class="empty-state"><i class="fas fa-video"></i><p>Нет видео</p></div>';return}
    c.innerHTML='<div class="video-grid">'+profileVideos.map(function(v){return '<div class="video-card" onclick="window.location.href=\'main.html?watch='+v.id+'\'"><div class="thumb-wrap">'+(v.thumbnail_url?'<img src="'+v.thumbnail_url+'">':'<video src="'+v.video_url+'" muted preload="metadata"></video>')+'</div><div class="video-info"><h3>'+v.title+'</h3><p>'+(v.views||0)+' просмотров • '+new Date(v.created_at).toLocaleDateString()+'</p></div></div>'}).join('')+'</div>';
}

function loadAboutTab(c){
    var totalViews=profileVideos.reduce(function(s,x){return s+(x.views||0)},0);
    var created=currentUser.created_at?new Date(currentUser.created_at).toLocaleDateString('ru-RU',{year:'numeric',month:'long',day:'numeric'}):'Неизвестно';
    var desc=channelSettings.description||'Описание не указано';
    c.innerHTML='<div class="about-section"><h3>Описание</h3><p>'+desc+'</p><h3>Подробнее</h3><div class="detail"><i class="fas fa-calendar"></i> Дата регистрации: '+created+'</div><div class="detail"><i class="fas fa-globe"></i> Страна: '+(channelSettings.country||'Не указана')+'</div><div class="detail"><i class="fas fa-link"></i> '+(channelSettings.link?'<a href="'+channelSettings.link+'" target="_blank">'+channelSettings.link+'</a>':'Ссылка не указана')+'</div><h3>Статистика</h3><div class="stats-row"><div class="stat-box"><h2>'+totalViews+'</h2><p>Просмотров</p></div><div class="stat-box"><h2>'+profileVideos.length+'</h2><p>Видео</p></div><div class="stat-box"><h2>'+document.getElementById('profileStats').textContent.split(' ')[0]+'</h2><p>Подписчиков</p></div></div></div>';
}

function loadPlaylistsTab(c){
    var playlists=JSON.parse(localStorage.getItem('playlists_'+currentUser.id)||'[]');
    if(!playlists.length){c.innerHTML='<div class="empty-state"><i class="fas fa-list"></i><p>Нет плейлистов</p><button class="btn btn-accent" onclick="createPlaylist()"><i class="fas fa-plus"></i> Создать плейлист</button></div>';return}
    c.innerHTML='<button class="btn btn-accent" style="margin-bottom:16px" onclick="createPlaylist()"><i class="fas fa-plus"></i> Создать</button><div class="playlist-grid">'+playlists.map(function(p){return '<div class="playlist-card"><div class="playlist-thumb"><i class="fas fa-list"></i></div><div class="playlist-info"><h4>'+p.name+'</h4><p>'+(p.videos?p.videos.length:0)+' видео • '+p.visibility+'</p></div></div>'}).join('')+'</div>';
}
window.createPlaylist=function(){var name=prompt('Название плейлиста:');if(!name)return;var playlists=JSON.parse(localStorage.getItem('playlists_'+currentUser.id)||'[]');playlists.push({name:name,videos:[],visibility:'Публичный',created:new Date().toISOString()});localStorage.setItem('playlists_'+currentUser.id,JSON.stringify(playlists));showTab('playlists')};

function loadAnalyticsTab(c){
    var totalViews=profileVideos.reduce(function(s,x){return s+(x.views||0)},0);
    var topVideo=profileVideos.sort(function(a,b){return(b.views||0)-(a.views||0)})[0];
    c.innerHTML='<div class="stats-row"><div class="stat-box"><h2>'+totalViews+'</h2><p>Всего просмотров</p></div><div class="stat-box"><h2>'+profileVideos.length+'</h2><p>Видео</p></div><div class="stat-box"><h2>'+Math.round(totalViews/(profileVideos.length||1))+'</h2><p>В среднем</p></div></div>'+(topVideo?'<h3 style="margin:24px 0 12px">🏆 Лучшее видео</h3><div class="video-card" onclick="window.location.href=\'main.html?watch='+topVideo.id+'\'"><div class="thumb-wrap">'+(topVideo.thumbnail_url?'<img src="'+topVideo.thumbnail_url+'">':'<video src="'+topVideo.video_url+'" muted></video>')+'</div><div class="video-info"><h3>'+topVideo.title+'</h3><p>'+(topVideo.views||0)+' просмотров</p></div></div>':'');
}

async function uploadBanner(){var f=document.getElementById('bannerFile').files[0];if(!f)return;var fd=new FormData();fd.append('file',f);var fn='banners/'+currentUser.id+'_'+Date.now();await fetch(SUPABASE_URL+'/storage/v1/object/music/'+fn,{method:'POST',headers:{'Authorization':'Bearer '+accessToken,'apikey':SUPABASE_ANON_KEY},body:fd});var url=SUPABASE_URL+'/storage/v1/object/public/music/'+fn;await fetch(SUPABASE_URL+'/auth/v1/user',{method:'PUT',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({data:{banner_url:url}})});currentUser.user_metadata.banner_url=url;localStorage.setItem('supabase_user',JSON.stringify(currentUser));document.getElementById('profileBanner').style.backgroundImage='url('+url+')'}
window.deleteBanner=async function(){if(!confirm('Удалить баннер?'))return;await fetch(SUPABASE_URL+'/auth/v1/user',{method:'PUT',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({data:{banner_url:null}})});currentUser.user_metadata.banner_url=null;localStorage.setItem('supabase_user',JSON.stringify(currentUser));document.getElementById('profileBanner').style.backgroundImage='';alert('Баннер удалён')}
function openEditModal(){document.getElementById('editName').value=currentUser.user_metadata?.name||'';document.getElementById('editDesc').value=channelSettings.description||'';document.getElementById('editCountry').value=channelSettings.country||'';document.getElementById('editLink').value=channelSettings.link||'';document.getElementById('editModal').style.display='flex'}
function closeEditModal(){document.getElementById('editModal').style.display='none'}
async function saveProfile(){
    var name=document.getElementById('editName').value.trim();if(!name)return;
    channelSettings.description=document.getElementById('editDesc').value.trim();
    channelSettings.country=document.getElementById('editCountry').value.trim();
    channelSettings.link=document.getElementById('editLink').value.trim();
    localStorage.setItem('channel_'+currentUser.id,JSON.stringify(channelSettings));
    var avatarFile=document.getElementById('editAvatarFile').files[0];var avatarUrl=currentUser.user_metadata?.avatar_url;
    if(avatarFile){var fd=new FormData();fd.append('file',avatarFile);var fn='avatars/'+currentUser.id+'_'+Date.now();await fetch(SUPABASE_URL+'/storage/v1/object/music/'+fn,{method:'POST',headers:{'Authorization':'Bearer '+accessToken,'apikey':SUPABASE_ANON_KEY},body:fd});avatarUrl=SUPABASE_URL+'/storage/v1/object/public/music/'+fn}
    await fetch(SUPABASE_URL+'/auth/v1/user',{method:'PUT',headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+accessToken,'Content-Type':'application/json'},body:JSON.stringify({data:{name:name,avatar_url:avatarUrl}})});
    currentUser.user_metadata.name=name;currentUser.user_metadata.avatar_url=avatarUrl;localStorage.setItem('supabase_user',JSON.stringify(currentUser));loadProfile();closeEditModal()
}
</script>
</body>
</html>
