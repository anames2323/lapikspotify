<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BluTube • Вход</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Roboto,Arial,sans-serif}
        body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0f0f0f;padding:20px}
        .card{background:#1a1a1a;padding:40px 30px;border-radius:12px;width:100%;max-width:380px}
        .logo{display:flex;align-items:center;justify-content:center;gap:8px;font-size:28px;font-weight:700;margin-bottom:30px;color:#3b82f6}
        .logo i{font-size:24px;background:#3b82f6;color:#fff;padding:8px;border-radius:8px}
        h2{text-align:center;margin-bottom:25px;color:#fff}
        .input-group{background:#272727;border-radius:8px;padding:0 15px;display:flex;align-items:center;margin-bottom:15px;border:1px solid #3e3e3e}
        .input-group i{color:#aaa;margin-right:12px}.input-group input{background:transparent;border:none;padding:16px 0;color:#fff;font-size:16px;width:100%;outline:none}
        .btn{background:#3b82f6;color:#fff;font-weight:700;padding:14px;border:none;border-radius:30px;width:100%;cursor:pointer;margin-top:10px}
        .btn:disabled{opacity:0.5}.error{color:#f00;font-size:14px;text-align:center;margin-top:10px;min-height:20px}
        .link{text-align:center;margin-top:20px;color:#aaa}.link a{color:#3b82f6;text-decoration:none}
    </style>
</head>
<body>
<div class="card">
    <div class="logo"><i class="fas fa-play"></i> BluTube</div>
    <h2>Войти</h2>
    <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="Email"></div>
    <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="password" placeholder="Пароль"></div>
    <button class="btn" id="loginBtn" onclick="doLogin()">Войти</button>
    <div class="error" id="error"></div>
    <p class="link">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
</div>
<script>
const SUPABASE_URL='https://axocsccfyyrtcegxvwal.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_Jga_s88V7TAEUSvHIFkMvA_DT5vG44E';
var saved=localStorage.getItem('supabase_token');if(saved){window.location.href='main.html'}
window.doLogin=async function(){
    var email=document.getElementById('email').value.trim(),password=document.getElementById('password').value;
    var err=document.getElementById('error'),btn=document.getElementById('loginBtn');
    if(!email||!password){err.textContent='Заполните все поля';return}
    btn.disabled=true;btn.textContent='Вход...';err.textContent='';
    try{var response=await fetch(SUPABASE_URL+'/auth/v1/token?grant_type=password',{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY},body:JSON.stringify({email:email,password:password})});var data=await response.json();if(!response.ok)throw new Error('Неверный email или пароль');if(data.access_token){localStorage.setItem('supabase_token',data.access_token);localStorage.setItem('supabase_user',JSON.stringify(data.user));window.location.href='main.html'}}catch(er){err.textContent='Неверный email или пароль';btn.disabled=false;btn.textContent='Войти'}
};
</script>
</body>
</html>
