<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Spoofy • Регистрация</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-logo">
            <i class="fab fa-spotify"></i>
            <span>Spoofy</span>
        </div>
        
        <h2 class="auth-title">Создать аккаунт</h2>
        
        <form id="register-form" class="auth-form">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="name" placeholder="Имя" required autocomplete="name">
            </div>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Email" required autocomplete="email">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Пароль (мин. 6 символов)" required autocomplete="new-password" minlength="6">
            </div>
            <button type="submit" class="auth-btn">
                <span class="btn-text">Зарегистрироваться</span>
                <span class="btn-loader" style="display:none;"><i class="fas fa-spinner fa-spin"></i></span>
            </button>
            <div class="auth-error" id="error-message"></div>
        </form>
        
        <p class="auth-link">
            Уже есть аккаунт? <a href="login.html">Войти</a>
        </p>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://axocscfyyrtcegxvwal.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4b2NzY2Z5eXJ0Y2VneHZ3YWwiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0NTQ0MjE2MSwiZXhwIjoyMDYxMDE4MTYxfQ.LhT5jBx2RjGpGZqP9ZBjY8Z3lBmWk1iA2zFkV8ZQf1s';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Проверяем, не авторизован ли уже
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'index.html';
            }
        }
        checkAuth();
        
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-message');
            const btnText = document.querySelector('.btn-text');
            const btnLoader = document.querySelector('.btn-loader');
            
            if (!name || !email || !password) {
                errorEl.textContent = 'Заполните все поля';
                return;
            }
            
            if (password.length < 6) {
                errorEl.textContent = 'Пароль должен быть не менее 6 символов';
                return;
            }
            
            btnText.style.display = 'none';
            btnLoader.style.display = 'inline';
            errorEl.textContent = '';
            
            try {
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: { 
                            name: name,
                            avatar_url: `https://i.pravatar.cc/150?u=${email}`
                        }
                    }
                });
                
                if (error) throw error;
                
                if (data.session) {
                    window.location.href = 'index.html';
                } else {
                    alert('Регистрация успешна! Теперь войдите.');
                    window.location.href = 'login.html';
                }
            } catch (error) {
                errorEl.textContent = error.message;
            } finally {
                btnText.style.display = 'inline';
                btnLoader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
