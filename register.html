<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест</title>
    <style>
        body { background: #000; color: #fff; padding: 20px; font-family: sans-serif; }
        button { padding: 20px; font-size: 20px; background: #1db954; border: none; border-radius: 10px; margin: 10px; }
        .box { padding: 20px; background: #333; margin: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>🧪 Тест JavaScript</h1>
    
    <div class="box" id="test1">Нажми кнопку ниже</div>
    <button onclick="document.getElementById('test1').innerHTML = '✅ JavaScript работает!'">Тест 1: onclick</button>
    
    <div class="box" id="test2">Ожидание...</div>
    <button id="test2btn">Тест 2: addEventListener</button>
    
    <div class="box" id="test3">Проверка Supabase...</div>
    <button id="test3btn">Тест 3: Проверить Supabase</button>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Тест 2
        document.getElementById('test2btn').addEventListener('click', function() {
            document.getElementById('test2').innerHTML = '✅ addEventListener работает!';
        });
        
        // Тест 3
        document.getElementById('test3btn').addEventListener('click', function() {
            const box = document.getElementById('test3');
            box.innerHTML = 'Проверяю...';
            
            try {
                const supabase = window.supabase.createClient(
                    'https://axocsccfyyrtcegxvwal.supabase.co',
                    'sb_publishable_Jga_s88V7TAEUSvHIFkMvA_DT5vG44E'
                );
                box.innerHTML = '✅ Supabase подключен!<br>URL: axocsccfyyrtcegxvwal.supabase.co';
            } catch(e) {
                box.innerHTML = '❌ Ошибка Supabase: ' + e.message;
            }
        });
        
        // Автоматическая проверка при загрузке
        window.onload = function() {
            document.getElementById('test2').innerHTML = '✅ Страница загружена, JavaScript работает';
        };
    </script>
</body>
</html>
