<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spoofy • Регистрация</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #0a0a0a 0%, #121212 100%); padding: 20px; }
        .auth-card { background: #181818; padding: 40px 30px; border-radius: 16px; width: 100%; max-width: 380px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
        .auth-logo { display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 32px; font-weight: 700; color: #1db954; margin-bottom: 30px; }
        h2 { text-align: center; margin-bottom: 25px; color: #fff; }
        .input-group { background: #1e1e1e; border-radius: 8px; padding: 0 15px; display: flex; align-items: center; margin-bottom: 15px; border: 1px solid #333; }
        .input-group i { color: #888; margin-right: 12px; }
        .input-group input { background: transparent; border: none; padding: 16px 0; color: #fff; font-size: 16px; width: 100%; outline: none; }
        .auth-btn { background: #1db954; color: #000; font-weight: 700; font-size: 16px; padding: 16px; border: none; border-radius: 30px; cursor: pointer; width: 100%; margin-top: 10px; }
        .auth-error { color: #ff4d4d; font-size: 14px; text-align: center; margin-top: 10px; }
        .auth-link { text-align: center; margin-top: 20px; color: #888; }
        .auth-link a { color: #1db954; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="auth-logo"><i class="fab fa-spotify"></i><span>Spoofy</span></div>
    <h2>Регистрация</h2>
    <form id="register-form">
        <div class="input-group"><i class="fas fa-user"></i><input type="text" id="name" placeholder="Имя" required></div>
        <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="Email" required></div>
        <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="password" placeholder="Пароль (мин. 6)" required minlength="6"></div>
        <button type="submit" class="auth-btn">Зарегистрироваться</button>
        <div class="auth-error" id="error"></div>
    </form>
    <p class="auth-link">Уже есть аккаунт? <a href="login.html">Войти</a></p>
</div>
<script>
const SUPABASE_URL = 'https://axocscfyyrtcegxvwal.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4b2NzY2Z5eXJ0Y2VneHZ3YWwiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0NTQ0MjE2MSwiZXhwIjoyMDYxMDE4MTYxfQ.LhT5jBx2RjGpGZqP9ZBjY8Z3lBmWk1iA2zFkV8ZQf1s';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

supabase.auth.getSession().then(({ data: { session } }) => { if (session) window.location.href = 'index.html'; });

document.getElementById('register-form').onsubmit = async e => {
    e.preventDefault();
    const name = document.getElementById('name').value.trim(), email = document.getElementById('email').value.trim(), password = document.getElementById('password').value;
    const err = document.getElementById('error');
    if (!name || !email || !password) { err.textContent = 'Заполните все поля'; return; }
    if (password.length < 6) { err.textContent = 'Пароль должен быть не менее 6 символов'; return; }
    try {
        const { data, error } = await supabase.auth.signUp({ email, password, options: { data: { name, avatar_url: `https://i.pravatar.cc/150?u=${email}` } } });
        if (error) throw error;
        if (data.session) { window.location.href = 'index.html'; } else { alert('Успешно! Теперь войдите.'); window.location.href = 'login.html'; }
    } catch (er) { err.textContent = er.message; }
};
</script>
</body>
</html>
