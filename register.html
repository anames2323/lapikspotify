<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouClone • Регистрация</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Roboto,Arial,sans-serif}
        body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0f0f0f;padding:20px}
        .card{background:#1a1a1a;padding:40px 30px;border-radius:12px;width:100%;max-width:380px}
        .logo{display:flex;align-items:center;justify-content:center;gap:8px;font-size:28px;font-weight:700;margin-bottom:30px;color:#f00}
        .logo i{font-size:32px}h2{text-align:center;margin-bottom:25px;color:#fff}
        .input-group{background:#272727;border-radius:8px;padding:0 15px;display:flex;align-items:center;margin-bottom:15px;border:1px solid #3e3e3e}
        .input-group i{color:#aaa;margin-right:12px}.input-group input{background:transparent;border:none;padding:16px 0;color:#fff;font-size:16px;width:100%;outline:none}
        .btn{background:#f00;color:#fff;font-weight:700;padding:14px;border:none;border-radius:30px;width:100%;cursor:pointer;margin-top:10px}
        .btn:disabled{opacity:0.5}
        .error{color:#f00;font-size:14px;text-align:center;margin-top:10px;min-height:20px}
        .link{text-align:center;margin-top:20px;color:#aaa}.link a{color:#f00;text-decoration:none}
    </style>
</head>
<body>
<div class="card">
    <div class="logo"><i class="fab fa-youtube"></i> YouClone</div>
    <h2>Регистрация</h2>
    
    <div class="input-group"><i class="fas fa-user"></i><input type="text" id="name" placeholder="Имя"></div>
    <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="Email"></div>
    <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="password" placeholder="Пароль (мин. 6)"></div>
    
    <button class="btn" id="regBtn" onclick="doRegister()">Зарегистрироваться</button>
    
    <div class="error" id="error"></div>
    <p class="link">Уже есть аккаунт? <a href="login.html">Войти</a></p>
</div>

<script>
const SUPABASE_URL='https://axocsccfyyrtcegxvwal.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_Jga_s88V7TAEUSvHIFkMvA_DT5vG44E';

// Проверяем, есть ли уже токен
var saved=localStorage.getItem('supabase_token');
if(saved){window.location.href='main.html'}

window.doRegister=async function(){
    var name=document.getElementById('name').value.trim();
    var email=document.getElementById('email').value.trim();
    var password=document.getElementById('password').value;
    var err=document.getElementById('error');
    var btn=document.getElementById('regBtn');
    
    if(!name||!email||!password){err.textContent='Заполните все поля';return}
    if(password.length<6){err.textContent='Пароль не менее 6 символов';return}
    
    btn.disabled=true;
    btn.textContent='Регистрация...';
    err.textContent='';
    
    try{
        // Шаг 1: Регистрируем
        var response=await fetch(SUPABASE_URL+'/auth/v1/signup',{
            method:'POST',
            headers:{'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY},
            body:JSON.stringify({email:email,password:password,data:{name:name,avatar_url:'https://i.pravatar.cc/150?u='+email}})
        });
        var data=await response.json();
        
        if(!response.ok){throw new Error(data.msg||'Ошибка регистрации')}
        
        // Шаг 2: Сразу входим
        var loginResponse=await fetch(SUPABASE_URL+'/auth/v1/token?grant_type=password',{
            method:'POST',
            headers:{'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY},
            body:JSON.stringify({email:email,password:password})
        });
        var loginData=await loginResponse.json();
        
        if(loginData.access_token){
            localStorage.setItem('supabase_token',loginData.access_token);
            localStorage.setItem('supabase_user',JSON.stringify(loginData.user));
            window.location.href='main.html';
        }else{
            alert('Регистрация успешна! Теперь войдите.');
            window.location.href='login.html';
        }
        
    }catch(er){
        err.textContent=er.message;
        btn.disabled=false;
        btn.textContent='Зарегистрироваться';
    }
};
</script>
</body>
</html>
