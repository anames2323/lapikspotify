<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouClone • Вход</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Roboto,Arial,sans-serif}
        body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0f0f0f;padding:20px}
        .card{background:#1a1a1a;padding:40px 30px;border-radius:12px;width:100%;max-width:380px}
        .logo{display:flex;align-items:center;justify-content:center;gap:8px;font-size:28px;font-weight:700;margin-bottom:30px;color:#f00}
        .logo i{font-size:32px}h2{text-align:center;margin-bottom:25px;color:#fff}
        .input-group{background:#272727;border-radius:8px;padding:0 15px;display:flex;align-items:center;margin-bottom:15px;border:1px solid #3e3e3e}
        .input-group i{color:#aaa;margin-right:12px}
        .input-group input{background:transparent;border:none;padding:16px 0;color:#fff;font-size:16px;width:100%;outline:none}
        .btn{background:#f00;color:#fff;font-weight:700;padding:14px;border:none;border-radius:30px;width:100%;cursor:pointer;margin-top:10px}
        .btn:disabled{opacity:0.5}
        .error{color:#f00;font-size:14px;text-align:center;margin-top:10px;min-height:20px}
        .link{text-align:center;margin-top:20px;color:#aaa}.link a{color:#f00;text-decoration:none}
        .debug{background:#111;padding:10px;border-radius:8px;margin-top:20px;font-size:12px;color:#0f0;word-break:break-all;max-height:100px;overflow-y:auto}
    </style>
</head>
<body>
<div class="card">
    <div class="logo"><i class="fab fa-youtube"></i> YouClone</div>
    <h2>Вход</h2>
    
    <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="Email"></div>
    <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="password" placeholder="Пароль"></div>
    
    <button class="btn" id="loginBtn" onclick="doLogin()">Войти</button>
    
    <div class="error" id="error"></div>
    <p class="link">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
    <div class="debug" id="debug">Ожидание...</div>
</div>

<script>
const SUPABASE_URL='https://axocsccfyyrtcegxvwal.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_Jga_s88V7TAEUSvHIFkMvA_DT5vG44E';

const debugEl=document.getElementById('debug');
function log(msg){debugEl.innerHTML=msg;console.log(msg)}

log('Страница загружена');

// Проверяем, есть ли уже токен
const saved=localStorage.getItem('supabase_token');
if(saved){log('Токен найден, перехожу...');window.location.href='main.html'}

window.doLogin=async function(){
    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('password').value;
    const err=document.getElementById('error');
    const btn=document.getElementById('loginBtn');
    
    if(!email||!password){err.textContent='Заполните все поля';return}
    
    btn.disabled=true;
    btn.textContent='Вход...';
    err.textContent='';
    
    log('Отправка запроса...');
    
    try{
        const response=await fetch(SUPABASE_URL+'/auth/v1/token?grant_type=password',{
            method:'POST',
            headers:{
                'Content-Type':'application/json',
                'apikey':SUPABASE_ANON_KEY
            },
            body:JSON.stringify({email,password})
        });
        
        const data=await response.json();
        log('Ответ: '+JSON.stringify(data));
        
        if(!response.ok){
            throw new Error(data.error_description||'Ошибка входа');
        }
        
        if(data.access_token){
            localStorage.setItem('supabase_token',data.access_token);
            localStorage.setItem('supabase_user',JSON.stringify(data.user));
            log('✅ Успех! Перехожу...');
            window.location.href='main.html';
        }
        
    }catch(er){
        log('❌ '+er.message);
        err.textContent='Неверный email или пароль';
        btn.disabled=false;
        btn.textContent='Войти';
    }
};
</script>
</body>
</html>
